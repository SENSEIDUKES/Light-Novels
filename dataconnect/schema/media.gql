enum MediaAssetType {
  IMAGE
  AUDIO
  VIDEO
  MOTION_COVER
  PDF
  EPUB
  MANGA_PAGE
  EXPORT
  OTHER
}

enum MediaAssetStatus {
  GENERATING
  PROCESSING
  UPLOADING
  READY
  FAILED
  ARCHIVED
  DELETED
  ORPHANED
  PENDING_CLEANUP
}

enum MediaVisibility {
  PRIVATE
  PUBLIC
}

enum MediaCleanupStatus {
  PENDING
  RUNNING
  SUCCEEDED
  FAILED
}

enum MediaDeletionIntentStatus {
  PENDING
  RUNNING
  SUCCEEDED
  FAILED
}

enum StorageQuotaReservationStatus {
  RESERVED
  COMMITTED
  RELEASED
  EXPIRED
}

# Compact metadata only. There is deliberately no bytes, base64, blob,
# provider-response, or permanent source-URL column on this table.
type MediaAsset @table @unique(fields: ["ownerUid", "uploadOperationId"]) @index(fields: ["ownerUid", "status", "createdAt"], order: [ASC, ASC, DESC]) @index(fields: ["storyId", "assetType"]) @index(fields: ["status", "updatedAt"]) {
  id: UUID! @default(expr: "uuidV4()")
  owner: UserAccount! @ref(fields: "ownerUid", references: "uid")
  ownerUid: String!
  story: Story @ref(fields: "storyId", references: "id")
  storyId: UUID
  generationJob: GenerationJob @ref(fields: "generationJobId", references: "id")
  generationJobId: UUID
  replacesAsset: MediaAsset @ref(fields: "replacesAssetId", references: "id")
  replacesAssetId: UUID
  uploadOperationId: String
  assetType: MediaAssetType!
  purpose: String!
  visibility: MediaVisibility! @default(value: PRIVATE)
  status: MediaAssetStatus! @default(value: PROCESSING)
  bucket: String!
  objectKey: String! @unique
  originalFilename: String
  mimeType: String!
  extension: String!
  byteSize: Int64!
  checksumSha256: String!
  etag: String
  width: Int
  height: Int
  durationMs: Int64
  version: Int! @default(value: 1)
  cacheControl: String!
  failureCode: String
  failureMessage: String
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  readyAt: Timestamp
  archivedAt: Timestamp
  deletedAt: Timestamp
  cleanupAfter: Timestamp
}

type MediaUploadAttempt @table @index(fields: ["assetId", "createdAt"]) {
  id: UUID! @default(expr: "uuidV4()")
  asset: MediaAsset! @ref(fields: "assetId", references: "id")
  assetId: UUID!
  attemptNumber: Int!
  sourceKind: String!
  status: String!
  provider: String
  errorCode: String
  errorMessage: String
  startedAt: Timestamp! @default(expr: "request.time")
  completedAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
}

# One asset can be used by multiple product surfaces without duplicating its R2
# object. targetKind/targetKey also cover future features that do not yet have a
# first-class table; known story/chapter/entity relations remain real FKs.
type MediaAttachment @table @unique(fields: ["assetId", "targetKind", "targetKey", "purpose"]) @index(fields: ["storyId", "purpose"]) {
  id: UUID! @default(expr: "uuidV4()")
  asset: MediaAsset! @ref(fields: "assetId", references: "id")
  assetId: UUID!
  story: Story @ref(fields: "storyId", references: "id")
  storyId: UUID
  chapter: Chapter @ref(fields: "chapterId", references: "id")
  chapterId: UUID
  entity: CodexEntity @ref(fields: "entityId", references: "id")
  entityId: UUID
  targetKind: String!
  targetKey: String!
  purpose: String!
  # Preserves the legacy visual-history discriminator (for example character,
  # location, cover) independently from the slot target used for selection.
  historyEntityType: String
  clientHistoryId: String
  promptUsed: String
  chapterNumber: Int
  arcTitle: String
  label: String
  position: Int! @default(value: 0)
  isCurrent: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  endedAt: Timestamp
}

# Exactly one current pointer exists per owner/target/purpose. Attachment rows
# remain immutable history, while this compact slot is advanced transactionally.
type MediaSlot @table(key: ["ownerUid", "targetKind", "targetKey", "purpose"]) @index(fields: ["storyId", "purpose"]) {
  owner: UserAccount! @ref(fields: "ownerUid", references: "uid")
  ownerUid: String!
  story: Story @ref(fields: "storyId", references: "id")
  storyId: UUID
  chapter: Chapter @ref(fields: "chapterId", references: "id")
  chapterId: UUID
  entity: CodexEntity @ref(fields: "entityId", references: "id")
  entityId: UUID
  targetKind: String!
  targetKey: String!
  purpose: String!
  currentAsset: MediaAsset! @ref(fields: "currentAssetId", references: "id")
  currentAssetId: UUID!
  version: Int64! @default(value: 1)
  updatedAt: Timestamp! @default(expr: "request.time")
}

type MediaUploadReceipt @table(key: ["ownerUid", "idempotencyKey"]) @index(fields: ["ownerUid", "createdAt"]) {
  owner: UserAccount! @ref(fields: "ownerUid", references: "uid")
  ownerUid: String!
  idempotencyKey: String!
  asset: MediaAsset! @ref(fields: "assetId", references: "id")
  assetId: UUID!
  requestHash: String!
  status: String!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type MediaDerivative @table @unique(fields: ["sourceAssetId", "variant"]) {
  id: UUID! @default(expr: "uuidV4()")
  sourceAsset: MediaAsset! @ref(fields: "sourceAssetId", references: "id")
  sourceAssetId: UUID!
  derivedAsset: MediaAsset! @ref(fields: "derivedAssetId", references: "id")
  derivedAssetId: UUID!
  variant: String!
  createdAt: Timestamp! @default(expr: "request.time")
}

type MediaCleanupTask @table @unique(fields: ["ownerUid", "idempotencyKey"]) @index(fields: ["status", "nextAttemptAt"]) {
  id: UUID! @default(expr: "uuidV4()")
  asset: MediaAsset! @ref(fields: "assetId", references: "id")
  assetId: UUID!
  ownerUid: String!
  bucket: String!
  objectKey: String!
  reason: String!
  idempotencyKey: String
  status: MediaCleanupStatus! @default(value: PENDING)
  attemptCount: Int! @default(value: 0)
  lastError: String
  nextAttemptAt: Timestamp! @default(expr: "request.time")
  leaseOwner: String
  leaseExpiresAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  completedAt: Timestamp
}

type MediaDeletionIntent @table(key: ["ownerUid", "idempotencyKey"]) @index(fields: ["status", "updatedAt"]) {
  owner: UserAccount! @ref(fields: "ownerUid", references: "uid")
  ownerUid: String!
  idempotencyKey: String!
  asset: MediaAsset! @ref(fields: "assetId", references: "id")
  assetId: UUID!
  story: Story @ref(fields: "storyId", references: "id")
  storyId: UUID
  reason: String!
  status: MediaDeletionIntentStatus! @default(value: PENDING)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  completedAt: Timestamp
  lastError: String
}

type UserStorageUsage @table(key: "userUid") {
  user: UserAccount! @ref(fields: "userUid", references: "uid")
  userUid: String!
  hardLimitBytes: Int64!
  usedBytes: Int64! @default(value: 0)
  reservedBytes: Int64! @default(value: 0)
  assetCount: Int64! @default(value: 0)
  revision: Int64! @default(value: 0)
  updatedAt: Timestamp! @default(expr: "request.time")
}

type StoryStorageUsage @table(key: "storyId") {
  story: Story! @ref(fields: "storyId", references: "id")
  storyId: UUID!
  ownerUid: String!
  usedBytes: Int64! @default(value: 0)
  reservedBytes: Int64! @default(value: 0)
  assetCount: Int64! @default(value: 0)
  updatedAt: Timestamp! @default(expr: "request.time")
}

type StorageQuotaReservation @table @unique(fields: ["ownerUid", "idempotencyKey"]) @index(fields: ["status", "expiresAt"]) {
  id: UUID! @default(expr: "uuidV4()")
  owner: UserAccount! @ref(fields: "ownerUid", references: "uid")
  ownerUid: String!
  story: Story @ref(fields: "storyId", references: "id")
  storyId: UUID
  asset: MediaAsset @ref(fields: "assetId", references: "id")
  assetId: UUID
  idempotencyKey: String!
  requestedBytes: Int64!
  status: StorageQuotaReservationStatus! @default(value: RESERVED)
  expiresAt: Timestamp!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  completedAt: Timestamp
}

# Catalog entries are references to curated, system-managed R2 objects. Phase
# one leaves the existing JSON catalogs authoritative; this table lets phase
# two import them without mixing them into user-owned cleanup flows.
type MediaCatalogEntry @table(key: "catalogId") @index(fields: ["assetType", "active"]) {
  catalogId: String!
  assetType: MediaAssetType!
  category: String!
  objectKey: String!
  publicUrl: String!
  mimeType: String
  byteSize: Int64
  tags: [String!]
  active: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type UserPortrait @table(key: "assetId") @index(fields: ["userUid", "active"]) {
  asset: MediaAsset! @ref(fields: "assetId", references: "id")
  assetId: UUID!
  user: UserAccount! @ref(fields: "userUid", references: "uid")
  userUid: String!
  prompt: String
  description: String
  daoRank: String
  daoXp: Int64
  powerStage: String
  equippedInventoryItem: UserInventoryItem @ref(fields: "equippedInventoryItemId", references: "id")
  equippedInventoryItemId: UUID
  usedReferenceImage: Boolean! @default(value: false)
  frameId: String
  glowId: String
  bannerId: String
  effectIds: [String!]
  active: Boolean! @default(value: false)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}
