  id: UUID! @default(expr: "uuidV4()")
  user: UserAccount! @ref(fields: "userUid", references: "uid")
  userUid: String!
  eventType: String!
  amount: Int64! @default(value: 0)
  sourceType: String
  sourceId: String
  idempotencyKey: String
