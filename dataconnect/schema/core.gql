# Celestial Library relational foundation.
#
# This schema intentionally does not mirror the legacy Firestore StoryWorld
# snapshot. Chapters, Codex records, generation jobs, settings, and media are
# independently addressable rows. Legacy identifiers are retained only as
# optional migration keys for the phase-two cutover.

enum AccountRole {
  USER
  ADMIN
  OWNER
}

enum SubscriptionTier {
  MORTAL
  OUTER_SECT
  INNER_SECT
  SECT_MASTER
  IMMORTAL
}

enum StoryStatus {
  DRAFT
  ACTIVE
  COMPLETED
  ARCHIVED
  DELETED
}

enum StoryVisibility {
  PRIVATE
  SHARED
  PUBLIC
}

enum StoryMemberRole {
  OWNER
  EDITOR
  READER
}

enum ArcStatus {
  PLANNED
  ACTIVE
  COMPLETED
  ARCHIVED
}

enum ChapterStatus {
  LOCKED
  UNLOCKED
  GENERATING
  UNREAD
  READ
  SEALED
  FAILED
  DELETED
}

enum GenerationJobKind {
  STORY_BLUEPRINT
  STORY_ARC
  CHAPTER
  CONTINUITY
  TRANSLATION
  IMAGE
  AUDIO
  VIDEO
  EXPORT
  OTHER
}

enum GenerationJobStatus {
  QUEUED
  RUNNING
  PAUSED
  SUCCEEDED
  FAILED
  CANCELLED
}

enum StoryChangeKind {
  UPSERTED
  CHAPTER_UPDATED
  PROFILE_UPDATED
  DELETED
}

enum StoryDeletionStatus {
  PENDING
  RUNNING
  SUCCEEDED
  FAILED
}

enum StoryDeletionStageKind {
  TOMBSTONE
  STRUCTURED_DATA
  MEDIA
  LOCAL_CACHE
  FINALIZE
}

enum StoryDeletionStageStatus {
  PENDING
  RUNNING
  SUCCEEDED
  FAILED
}

type UserAccount @table(key: "uid") {
  # Client operations set this from auth.uid explicitly. Keeping auth.uid as a
  # schema default breaks trusted Admin SDK writes, which have no end-user auth
  # context even when the operation supplies the owner UID.
  uid: String!
  email: String @unique
  displayName: String
  role: AccountRole! @default(value: USER)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type UserProfile @table(key: "userUid") {
  user: UserAccount! @ref(fields: "userUid", references: "uid")
  userUid: String!
  username: String @unique
  displayNameColor: String
  preferredLanguage: String
  defaultTranslationLanguage: String
  subscriptionTier: SubscriptionTier! @default(value: MORTAL)
  legacyQi: Int64
  daoXp: Int64! @default(value: 0)
  daoRank: String
  heavenlyQi: Int64! @default(value: 0)
  sectQi: Int64! @default(value: 0)
  demonicQi: Int64! @default(value: 0)
  writingStreak: Int! @default(value: 0)
  savedStoryCount: Int! @default(value: 0)
  activePortrait: MediaAsset @ref(fields: "activePortraitAssetId", references: "id")
  activePortraitAssetId: UUID
  imageGenerationCount: Int! @default(value: 0)
  imageQuotaResetAt: Timestamp
  lastSessionEnd: Timestamp
  daoPillarStreak: Int! @default(value: 0)
  daoPillarCracked: Boolean! @default(value: false)
  lastReadDate: String
  lastInteractionDate: String
  equippedInventoryItem: UserInventoryItem @ref(fields: "equippedInventoryItemId", references: "id")
  equippedInventoryItemId: UUID
  syncRevision: String
  revision: Int64! @default(value: 0)
  lastReadAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type UserPreference @table(key: "userUid") {
  user: UserAccount! @ref(fields: "userUid", references: "uid")
  userUid: String!
  fontSize: String
  fontFamily: String
  lineHeightScale: Float
  paragraphSpacingScale: Float
  letterSpacing: Float
  wordSpacing: Float
  readingWidth: Int
  textAlignment: String
  contextEngine: String
  theme: String
  colorPaletteId: String
  highlightStyle: String
  audioMusicVolume: Float
  audioAtmosphereVolume: Float
  audioVoiceVolume: Float
