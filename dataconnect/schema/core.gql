# Records the result of each manual image-quota charge. The composite key makes
# retries observable without charging the same request twice.
type ImageQuotaConsumption @table(key: ["ownerUid", "idempotencyKey"]) @index(fields: ["ownerUid", "consumedAt"]) {
  owner: UserAccount! @ref(fields: "ownerUid", references: "uid")
  ownerUid: String!
  idempotencyKey: String!
  imageGenerationCount: Int!
  imageQuotaResetAt: Timestamp!
  consumedAt: Timestamp! @default(expr: "request.time")
}

type StorySeed @table @unique(fields: ["ownerUid", "legacySeedId"]) @unique(fields: ["ownerUid", "clientSeedId"]) @index(fields: ["ownerUid", "updatedAt"], order: [ASC, DESC]) {
  id: UUID! @default(expr: "uuidV4()")
  owner: UserAccount! @ref(fields: "ownerUid", references: "uid")
  ownerUid: String!
  legacySeedId: String
  clientSeedId: String
  title: String!
  schemaVersion: Int! @default(value: 1)
  syncRevision: String
  revision: Int64! @default(value: 0)
  deletedAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Intake and blueprint values remain independently addressable instead of being
# persisted as one opaque seed document. Complex list values use repeated rows.
type StorySeedField @table(key: ["seedId", "section", "fieldKey", "position"]) {
  seed: StorySeed! @ref(fields: "seedId", references: "id")
  seedId: UUID!
  section: String!
  fieldKey: String!
  position: Int! @default(value: 0)
  stringValue: String
  numberValue: Float
  booleanValue: Boolean
}

type StorySeedEntity @table @unique(fields: ["seedId", "entityKind", "clientEntityId"]) {
  id: UUID! @default(expr: "uuidV4()")
  seed: StorySeed! @ref(fields: "seedId", references: "id")
  seedId: UUID!
  entityKind: String!
  clientEntityId: String!
  position: Int! @default(value: 0)
  name: String!
  age: String
  skinTone: String
  eyeColor: String
  powerType: String
  rankLevel: String
  role: String
  powerLevel: String
  alignment: String
  connectionToMainCharacter: String
  description: String
}

type StorySeedEntityAlias @table(key: ["seedEntityId", "normalizedAlias"]) {
  seedEntity: StorySeedEntity! @ref(fields: "seedEntityId", references: "id")
  seedEntityId: UUID!
  alias: String!
  normalizedAlias: String!
  position: Int! @default(value: 0)
}

type Story @table @unique(fields: ["ownerUid", "legacyStoryId"]) @unique(fields: ["ownerUid", "clientStoryId"]) @index(fields: ["ownerUid", "updatedAt"], order: [ASC, DESC]) {
  id: UUID! @default(expr: "uuidV4()")
  owner: UserAccount! @ref(fields: "ownerUid", references: "uid")
  ownerUid: String!
  sourceSeed: StorySeed @ref(fields: "sourceSeedId", references: "id")
  sourceSeedId: UUID
  parentStory: Story @ref(fields: "parentStoryId", references: "id")
  parentStoryId: UUID
  legacyStoryId: String
  clientStoryId: String
  title: String!
  genre: String!
  mainCharacterName: String
  premise: String
  status: StoryStatus! @default(value: DRAFT)
  visibility: StoryVisibility! @default(value: PRIVATE)
  currentChapterNumber: Int! @default(value: 0)
  forkChapterNumber: Int
  syncRevision: String
  revision: Int64! @default(value: 0)
  schemaVersion: Int! @default(value: 1)
  lastImageChapter: Int
  evolutionReady: Boolean! @default(value: false)
  evolutionReason: String
  availableVisualUpdate: Boolean! @default(value: false)
  isEdited: Boolean! @default(value: false)
  conflictResolvedAt: Timestamp
  deletedAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Append-only owner-scoped synchronization feed. Story rows remain soft-deleted,
# so tombstones are durable and stale IndexedDB snapshots cannot resurrect them.
type StoryChange @table @unique(fields: ["ownerUid", "idempotencyKey"]) @index(fields: ["ownerUid", "changedAt"], order: [ASC, ASC]) {
  id: UUID! @default(expr: "uuidV4()")
  owner: UserAccount! @ref(fields: "ownerUid", references: "uid")
  ownerUid: String!
  story: Story! @ref(fields: "storyId", references: "id")
  storyId: UUID!
  changeKind: StoryChangeKind!
  storyRevision: Int64!
  syncRevision: String!
  idempotencyKey: String!
  changedAt: Timestamp! @default(expr: "request.time")
}

# A durable receipt is inserted in the same transaction as each graph write.
# Retried callers can look up the original result after an ambiguous response.
type PersistenceReceipt @table(key: ["ownerUid", "idempotencyKey"]) @index(fields: ["ownerUid", "createdAt"]) {
  owner: UserAccount! @ref(fields: "ownerUid", references: "uid")
  ownerUid: String!
  idempotencyKey: String!
  operation: String!
  story: Story @ref(fields: "storyId", references: "id")
  storyId: UUID
  chapter: Chapter @ref(fields: "chapterId", references: "id")
  chapterId: UUID
  seed: StorySeed @ref(fields: "seedId", references: "id")
  seedId: UUID
  resultingSyncRevision: String
  resultingRevision: Int64
  requestHash: String
  createdAt: Timestamp! @default(expr: "request.time")
}

# Serializes compare-and-swap writes independently from large graph upserts.
# The guard is advanced by native SQL in the same transaction as each graph
# mutation, closing the read-then-write race between concurrent requests.
type PersistenceAggregateVersion @table(key: ["ownerUid", "aggregateKind", "aggregateId"]) @index(fields: ["ownerUid", "updatedAt"]) {
  owner: UserAccount! @ref(fields: "ownerUid", references: "uid")
  ownerUid: String!
  aggregateKind: String!
  aggregateId: String!
  syncRevision: String
  revision: Int64!
  updatedAt: Timestamp! @default(expr: "request.time")
}

