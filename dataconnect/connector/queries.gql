query AdminGetAdminOverview($actorUid: String!, $limit: Int = 1000)
  @auth(level: NO_ACCESS) {
  actor: userAccount(key: { uid: $actorUid })
    @check(
      expr: "this != null && (this.role == 'ADMIN' || this.role == 'OWNER')"
      message: "Administrator access required"
    ) {
    uid
    role
  }
  accounts: userAccounts(orderBy: [{ createdAt: ASC }], limit: $limit) {
    uid
    email
    displayName
    role
    createdAt
    updatedAt
  }
  profiles: userProfiles(orderBy: [{ createdAt: ASC }], limit: $limit) {
    userUid
    username
    subscriptionTier
    legacyQi
    daoXp
    daoRank
    heavenlyQi
    sectQi
    demonicQi
    writingStreak
    savedStoryCount
    activePortraitAssetId
    imageGenerationCount
    imageQuotaResetAt
    syncRevision
    revision
    createdAt
    updatedAt
  }
  stories(orderBy: [{ updatedAt: DESC }], limit: $limit) {
    id
    ownerUid
    legacyStoryId
    clientStoryId
    title
    status
    syncRevision
    revision
    deletedAt
    createdAt
    updatedAt
  }
}
