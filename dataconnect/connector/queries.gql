      createdAt
    }
  }
  fingerprints: chapterSceneFingerprints(
    where: {
      chapterId: { eq: $chapterId }
      storyId: { eq: $storyId }
      story: { ownerUid: { eq: $ownerUid } }
    }
    orderBy: [{ createdAt: ASC }]
  ) {
    id
    chapterNumber
    actionType
    location
    outcome
    participants
    createdAt
  }
  facts: chapterFacts(
    where: {
      chapterId: { eq: $chapterId }
      storyId: { eq: $storyId }
      story: { ownerUid: { eq: $ownerUid } }
    }
    orderBy: [{ createdAt: ASC }]
  ) {
