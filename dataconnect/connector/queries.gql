# Story scaffolding, memory, Codex, reader state, generation state, and media
# references are returned together. Full prose/block payloads use the dedicated
# AdminGetOwnedChapterContentGraph operation so ordinary library hydration does
# not pull every chapter body.
query AdminGetOwnedStoryGraph($ownerUid: String!, $storyId: UUID!) @auth(level: NO_ACCESS) {
  story(first: { where: { id: { eq: $storyId }, ownerUid: { eq: $ownerUid } } }) {
    id
    ownerUid
    sourceSeedId
    parentStoryId
    legacyStoryId
    clientStoryId
    title
    genre
    mainCharacterName
    premise
    status
    visibility
    currentChapterNumber
    forkChapterNumber
    syncRevision
    revision
    schemaVersion
    lastImageChapter
    evolutionReady
    evolutionReason
    availableVisualUpdate
    isEdited
    conflictResolvedAt
    deletedAt
    createdAt
    updatedAt
  }
  members: storyMembers(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
  ) {
    storyId
    userUid
    role
    createdAt
  }
  preferences: storyPreferences(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
  ) {
    storyId
    contextEngine
    hardcoreFateMode
    fatePressure
    motionCoverActive
    assignedRevealBackdropPolicy
    updatedAt
  }
  readerPreferences: storyReaderPreferences(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
  ) {
    storyId
    userUid
    fontSize
    fontFamily
    lineHeight
    paragraphSpacing
    lineHeightScale
    paragraphSpacingScale
    letterSpacing
    wordSpacing
    readingWidth
    textAlignment
    contextEngine
    themeOverride
    colorPaletteId
    highlightStyle
    updatedAt
  }
  memoryStates: storyMemoryStates(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
  ) {
    storyId
    powerSystem
    currentPowerStage
    updatedAt
  }
  memoryWarnings: storyMemoryWarnings(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
    orderBy: [{ createdAt: ASC }]
  ) {
    id
    warning
    resolvedAt
    createdAt
  }
  rules: storyRules(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
    orderBy: [{ position: ASC }]
  ) {
    id
    ruleKey
    ruleValue
    isPinned
    position
    updatedAt
  }
  revealBackdrops: storyRevealBackdrops(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
  ) {
    entityStableKey
    backdropAssetId
    updatedAt
  }
  arcs: storyArcs(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
    orderBy: [{ arcNumber: ASC }]
  ) {
    id
    arcNumber
    title
    summary
    episodicSummaries
    status
    createdAt
    updatedAt
  }
  chapters(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
    orderBy: [{ chapterNumber: ASC }]
  ) {
    id
    storyId
    arcId
    legacyChapterId
    clientChapterId
    chapterNumber
    title
    premise
    status
    summary
    episodicSummary
    contentHash
    versionId
    syncRevision
    revision
    branchAnchor
    continuityWarnings
    continuitySoftNotes
    contractObjectiveFulfilled
    contractEvidence
    contractOpeningMatched
    embedding
    isSealed
    sealedAt
    hasContinuityFaults
    createdAt
    updatedAt
  }
  codexEntities(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
    orderBy: [{ kind: ASC }, { name: ASC }]
  ) {
    id
    stableKey
    kind
    name
    role
    description
    status
    relationshipToMainCharacter
    relevanceState
    contextPriority
    authorContextNote
    firstAppearedChapter
    lastMajorInvolvementChapter
    currentRelevance
    toneMemory
    manifestationImportance
    isUserPinned
    pendingEvolution
    evolutionReady
    evolutionReason
    availableVisualUpdate
    lastImageChapter
    arcAccumulation
    sourceChapterNumber
    sourceBlockId
    provenanceCreatedBy
    provenanceConfidence
    lastMentionedChapter
    supersedesStableKey
    createdAt
    updatedAt
    aliases: codexAliases_on_entity(orderBy: [{ alias: ASC }]) {
      alias
      normalizedAlias
      isCanonical
    }
    attributes: codexEntityAttributes_on_entity(orderBy: [{ attributeKey: ASC }]) {
      attributeKey
      stringValue
      numberValue
      booleanValue
      stringListValue
      jsonValue
      updatedAt
    }
    progression: abilityProgressionEvents_on_abilityEntity(orderBy: [{ chapterNumber: ASC }]) {
      id
      chapterNumber
      fromMastery
      toMastery
      note
      createdAt
    }
    threadLinks: codexThreadLinks_on_entity {
      threadId
      createdAt
    }
  }
  codexRelationships(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
  ) {
    id
    sourceEntityId
    targetEntityId
    sourceStableKey
    targetStableKey
    sourceName
    targetName
    relationshipKind
    affinity
    threat
    description
    status
    createdAt
    updatedAt
  }
  plotThreads(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
    orderBy: [{ createdAt: ASC }]
  ) {
    id
    stableKey
    description
    status
    originChapterNumber
    resolvedChapterNumber
    confidence
    isUserPinned
    sourceChapterNumber
    sourceBlockId
    provenanceCreatedBy
    provenanceConfidence
    lastMentionedChapter
    supersedesStableKey
    createdAt
    updatedAt
  }
  karmaNodes(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
    orderBy: [{ createdAt: ASC }]
  ) {
    id
    sourceEntityId
    targetEntityId
    sourceStableKey
    targetStableKey
    sourceName
    targetName
    description
    severity
    nodeType
    status
    createdAt
    resolvedAt
  }
  timelineEvents(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
    orderBy: [{ chapterNumber: ASC }, { createdAt: ASC }]
  ) {
    id
    chapterId
    chapterNumber
    title
    description
    eventType
    occurredAtLabel
    createdAt
  }
  bookmarks(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
    orderBy: [{ createdAt: ASC }]
  ) {
    id
    userUid
    chapterId
    paragraphIndex
    paragraphExcerpt
    note
    createdAt
  }
  readingProgresses(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
  ) {
    userUid
    chapterNumber
    anchorBlockId
    anchorText
    anchorOffset
    anchorParagraphIndex
    anchorContentSignature
    anchorIntraBlockRatio
    anchorSavedAt
    legacyScrollPosition
    anchor
    totalReadingTimeMs
    lastReadAt
    updatedAt
  }
  arcReadingProgresses(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
    orderBy: [{ arcNumber: ASC }]
  ) {
    userUid
    arcNumber
    readingTimeMs
    updatedAt
  }
  glossaryTerms(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
    orderBy: [{ sourceText: ASC }]
  ) {
    id
    sourceText
    targetText
    targetLanguage
    note
    createdAt
    updatedAt
  }
  generationJobs(
    where: { storyId: { eq: $storyId }, ownerUid: { eq: $ownerUid } }
    orderBy: [{ createdAt: ASC }]
  ) {
    id
    chapterId
    kind
    status
    provider
    model
    inputHash
    idempotencyKey
    attemptCount
    errorCode
    errorMessage
    startedAt
    completedAt
    createdAt
    updatedAt
    events: generationEvents_on_job(orderBy: [{ createdAt: ASC }]) {
      id
      eventType
      message
      progress
      createdAt
    }
  }
  generationBatches: chapterGenerationBatches(
    where: { storyId: { eq: $storyId }, story: { ownerUid: { eq: $ownerUid } } }
    orderBy: [{ createdAt: ASC }]
  ) {
    id
    clientBatchId
    status
    currentChapterNumber
    failedChapterNumber
    errorMessage
    createdAt
    completedAt
    updatedAt
    items: chapterGenerationBatchItems_on_batch(orderBy: [{ chapterNumber: ASC }]) {
      chapterNumber
      status
      completedAt
      updatedAt
    }
  }
  mediaSlots(
    where: { storyId: { eq: $storyId }, ownerUid: { eq: $ownerUid } }
    orderBy: [{ targetKind: ASC }, { targetKey: ASC }, { purpose: ASC }]
  ) {
    targetKind
    targetKey
    purpose
    chapterId
    entityId
    currentAssetId
    version
    updatedAt
  }
  mediaAttachments(
    where: { storyId: { eq: $storyId }, asset: { ownerUid: { eq: $ownerUid } } }
    orderBy: [{ createdAt: ASC }]
  ) {
    id
    assetId
    chapterId
    entityId
    targetKind
    targetKey
    purpose
    clientHistoryId
    promptUsed
    chapterNumber
    arcTitle
    label
    position
    isCurrent
    createdAt
    endedAt
  }
  deletionJobs: storyDeletionJobs(
    where: { storyId: { eq: $storyId }, ownerUid: { eq: $ownerUid } }
  ) {
    id
    idempotencyKey
    status
    currentStage
    leaseOwner
    leaseExpiresAt
    attemptCount
    lastError
    createdAt
    updatedAt
    completedAt
    stages: storyDeletionStages_on_job {
      stage
      status
      attemptCount
      lastError
      startedAt
      completedAt
      updatedAt
    }
  }
}

query AdminGetOwnedChapterContentGraph(
  $ownerUid: String!
  $storyId: UUID!
  $chapterId: UUID!
) @auth(level: NO_ACCESS) {
  chapter(
    first: {
      where: {
        id: { eq: $chapterId }
        storyId: { eq: $storyId }
        story: { ownerUid: { eq: $ownerUid } }
      }
    }
  ) {
    id
    storyId
    arcId
    legacyChapterId
    clientChapterId
    chapterNumber
    title
    premise
    status
    summary
    episodicSummary
    contentHash
    versionId
    syncRevision
    revision
    branchAnchor
    continuityWarnings
    continuitySoftNotes
    contractObjectiveFulfilled
    contractEvidence
    contractOpeningMatched
    embedding
    isSealed
    sealedAt
    hasContinuityFaults
    createdAt
    updatedAt
    content: chapterContent_on_chapter {
      generatedContent
      statsChangeMessage
      contextEngine
      contextRoute
      contextEstimatedTokens
      contextBudgetTokens
      contractObjective
      contractRequiredOpening
      handoffNextImmediateAction
      handoffEndLocation
      handoffEndTimeMarker
      handoffMainCharacterCondition
      handoffOpenTension
      revisionId
      syncRevision
      revision
      cuePayload
      contextManifest
      handoff
      contract
      updatedAt
    }
    blocks: chapterBlocks_on_chapter(orderBy: [{ isArchived: ASC }, { position: ASC }]) {
      id
      legacyBlockId
      position
      blockType
      text
      speakerName
      speakerRole
      mode
      sceneType
      environment
      atmosphereCategory
      atmosphereTags
      theme
      motion
      emotion
      intensity
      tension
      danger
      mysticism
      audioSignature
      isArchived
      music
      beastEvent
      systemEvent
      worldCard
      attributes: chapterBlockAttributes_on_block {
        attributeKey
        stringValue
        numberValue
        booleanValue
      }
      entityMentions: chapterBlockEntityMentions_on_block(orderBy: [{ position: ASC }]) {
        position
        entityId
        name
        entityType
        mentionKind
      }
    }
    translations: chapterTranslations_on_chapter(orderBy: [{ languageCode: ASC }]) {
      languageCode
