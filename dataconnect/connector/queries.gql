}

query AdminListStaleMediaUploads($staleBefore: Timestamp!, $limit: Int = 100) @auth(level: NO_ACCESS) {
  mediaAssets(
    where: { status: { eq: UPLOADING }, updatedAt: { le: $staleBefore } }
    orderBy: [{ updatedAt: ASC }]
    limit: $limit
  ) {
    id
    ownerUid
    storyId
    generationJobId
    replacesAssetId
    assetType
    purpose
    visibility
    status
    bucket
    objectKey
    originalFilename
    mimeType
    extension
    byteSize
    checksumSha256
    etag
    width
    height
    durationMs
    version
    cacheControl
    failureCode
    failureMessage
    createdAt
    updatedAt
    readyAt
    archivedAt
    deletedAt
    cleanupAfter
  }
}

query AdminListMediaCleanupTasks($limit: Int = 100) @auth(level: NO_ACCESS) {
  mediaCleanupTasks(
    where: {
      _and: [
        { nextAttemptAt: { le_expr: "request.time" } }
        {
          _or: [
            { status: { in: [PENDING, FAILED] } }
            { status: { eq: RUNNING }, leaseExpiresAt: { lt_expr: "request.time" } }
          ]
        }
      ]
    }
    orderBy: [{ nextAttemptAt: ASC }]
    limit: $limit
  ) {
    id
    assetId
    ownerUid
    bucket
    objectKey
    reason
    idempotencyKey
    status
    attemptCount
    lastError
    nextAttemptAt
    leaseOwner
    leaseExpiresAt
    createdAt
  }
}

query AdminListMediaAssetsForStorageReport($limit: Int = 500, $offset: Int = 0) @auth(level: NO_ACCESS) {
  mediaAssets(
    where: { status: { nin: [DELETED] } }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
    offset: $offset
  ) {
    id
    ownerUid
    storyId
    assetType
    status
    byteSize
    mimeType
    objectKey
    createdAt
  }
}

# Incremental browser sync is always derived from auth.uid and deliberately
# includes DELETED tombstones.
query ListMyStoryChanges($changedAfter: Timestamp!, $limit: Int = 200) @auth(level: USER) {
  storyChanges(
    where: {
      ownerUid: { eq_expr: "auth.uid" }
      changedAt: { gt: $changedAfter }
    }
    orderBy: [{ changedAt: ASC }, { id: ASC }]
    limit: $limit
  ) {
    id
    storyId
    changeKind
    storyRevision
    syncRevision
    idempotencyKey
    changedAt
  }
}

