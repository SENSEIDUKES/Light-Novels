query GetMyAccount @auth(level: USER) {
  userAccount(key: { uid_expr: "auth.uid" }) {
    uid
    email
    displayName
    role
    createdAt
    updatedAt
  }
}

query ListMyFoundationProbes @auth(level: USER) {
  foundationProbes(
    where: { ownerUid: { eq_expr: "auth.uid" } }
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    label
    createdAt
  }
}

query GetMyFoundationProbe($id: UUID!) @auth(level: USER) {
  foundationProbe(
    first: {
      where: {
        id: { eq: $id }
        ownerUid: { eq_expr: "auth.uid" }
      }
    }
  ) {
    id
    label
    createdAt
  }
}

query ListMyStories @auth(level: USER) {
  stories(
    where: {
      ownerUid: { eq_expr: "auth.uid" }
      status: { ne: DELETED }
    }
    orderBy: [{ updatedAt: DESC }]
  ) {
    id
    legacyStoryId
    title
    genre
    mainCharacterName
    premise
    status
    visibility
    currentChapterNumber
    syncRevision
    createdAt
    updatedAt
  }
}

query GetMyStory($id: UUID!) @auth(level: USER) {
  story(
    first: {
      where: {
        id: { eq: $id }
        ownerUid: { eq_expr: "auth.uid" }
        status: { ne: DELETED }
      }
    }
  ) {
    id
    legacyStoryId
    title
    genre
    mainCharacterName
    premise
    status
    visibility
    currentChapterNumber
    syncRevision
    createdAt
    updatedAt
    arcs: storyArcs_on_story(orderBy: [{ arcNumber: ASC }]) {
      id
      arcNumber
      title
      summary
      status
    }
    chapters: chapters_on_story(orderBy: [{ chapterNumber: ASC }]) {
      id
      chapterNumber
      title
      premise
      status
      summary
      contentHash
      versionId
      isSealed
      updatedAt
    }
  }
}

query GetMyChapter($storyId: UUID!, $chapterNumber: Int!) @auth(level: USER) {
  chapter(
    first: {
      where: {
        storyId: { eq: $storyId }
        chapterNumber: { eq: $chapterNumber }
        story: {
          ownerUid: { eq_expr: "auth.uid" }
          status: { ne: DELETED }
        }
        status: { ne: DELETED }
      }
    }
  ) {
    id
    chapterNumber
    title
    premise
    status
    summary
    contentHash
    versionId
    isSealed
    content: chapterContent_on_chapter {
      generatedContent
      statsChangeMessage
      contextEngine
      contractObjective
      contractRequiredOpening
      handoffNextImmediateAction
      handoffEndLocation
      handoffOpenTension
      revisionId
      syncRevision
      updatedAt
    }
    blocks: chapterBlocks_on_chapter(orderBy: [{ position: ASC }]) {
      id
      legacyBlockId
      position
      blockType
      text
      speakerName
      speakerRole
      sceneType
      environment
      atmosphereCategory
      atmosphereTags
      theme
      emotion
      intensity
    }
  }
}

query GetMyMediaAsset($id: UUID!) @auth(level: USER) {
  mediaAsset(
    first: {
      where: {
        id: { eq: $id }
        ownerUid: { eq_expr: "auth.uid" }
        status: { nin: [DELETED, ORPHANED] }
      }
    }
  ) {
    id
    storyId
    assetType
    purpose
    visibility
    status
    bucket
    objectKey
    originalFilename
    mimeType
    extension
    byteSize
    checksumSha256
    etag
    width
    height
    durationMs
    version
    cacheControl
    createdAt
    updatedAt
    readyAt
  }
}

query ListMyMediaAssets($storyId: UUID, $status: MediaAssetStatus, $limit: Int = 100)
  @auth(level: USER) {
  mediaAssets(
    where: {
      ownerUid: { eq_expr: "auth.uid" }
      storyId: { eq: $storyId }
      status: { eq: $status }
    }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
  ) {
    id
    storyId
    assetType
    purpose
    visibility
    status
    bucket
    objectKey
    mimeType
    byteSize
    width
    height
    durationMs
    createdAt
    readyAt
    cleanupAfter
  }
}

