query AdminGetStorageUsageReport @auth(level: NO_ACCESS) {
  totals: _selectFirst(
    sql: """
      SELECT
        COALESCE(SUM(byte_size), 0)::bigint AS total_bytes,
        COUNT(*)::bigint AS asset_count,
        COUNT(*) FILTER (WHERE status = 'UPLOADING')::bigint AS uploading_count,
        COUNT(*) FILTER (WHERE status IN ('FAILED', 'PENDING_CLEANUP', 'ORPHANED'))::bigint AS attention_count
      FROM media_asset
      WHERE status <> 'DELETED'
    """
  )
  byUser: _select(
    sql: """
      SELECT owner_uid, COALESCE(SUM(byte_size), 0)::bigint AS used_bytes, COUNT(*)::bigint AS asset_count
      FROM media_asset
      WHERE status <> 'DELETED'
      GROUP BY owner_uid
      ORDER BY used_bytes DESC
    """
  )
  byStory: _select(
    sql: """
      SELECT owner_uid, story_id, COALESCE(SUM(byte_size), 0)::bigint AS used_bytes, COUNT(*)::bigint AS asset_count
      FROM media_asset
      WHERE status <> 'DELETED' AND story_id IS NOT NULL
      GROUP BY owner_uid, story_id
      ORDER BY used_bytes DESC
    """
  )
  byType: _select(
    sql: """
      SELECT asset_type, COALESCE(SUM(byte_size), 0)::bigint AS used_bytes, COUNT(*)::bigint AS asset_count
      FROM media_asset
      WHERE status <> 'DELETED'
      GROUP BY asset_type
      ORDER BY used_bytes DESC
    """
  )
}

