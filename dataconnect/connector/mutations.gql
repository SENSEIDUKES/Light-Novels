    @allow(fields: "id storyId chapterId chapterNumber actionType location outcome participants createdAt")
  $factIds: [UUID!]!
  $facts: [ChapterFact_Data!]!
    @allow(fields: "id storyId chapterId chapterNumber factKind subjectKey factText confidence isPinned createdAt")
