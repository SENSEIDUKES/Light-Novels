mutation AdminSelectUserPortrait(
  $ownerUid: String!
  $assetId: UUID!
  $idempotencyKey: String!
  $expectedActivePortraitAssetId: UUID
  $expectedSyncRevision: String
  $newSyncRevision: String!
  $newRevision: Int64!
  $prompt: String
  $description: String
  $daoRank: String
  $daoXp: Int64
  $powerStage: String
  $equippedInventoryItemId: UUID
  $usedReferenceImage: Boolean!
  $frameId: String
  $glowId: String
  $bannerId: String
  $effectIds: [String!]
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    asset: mediaAsset(first: { where: { id: { eq: $assetId }, ownerUid: { eq: $ownerUid }, status: { eq: READY } } })
      @check(expr: "this != null", message: "Ready portrait asset not found") {
      assetType @check(expr: "this == 'IMAGE'", message: "Portrait asset must be an image")
    }
    profile: userProfile(key: { userUid: $ownerUid })
      @check(expr: "this != null", message: "User profile not found") {
      activePortraitAssetId
        @check(expr: "this == vars.expectedActivePortraitAssetId", message: "Active portrait changed")
      syncRevision
        @check(expr: "this == vars.expectedSyncRevision", message: "Profile expected revision is stale")
    }
    duplicate: persistenceReceipt(
      key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    ) @check(expr: "this == null", message: "Idempotency key already completed") {
      idempotencyKey
    }
  }
  profileVersionGuard: _executeReturningFirst(
    sql: """
      INSERT INTO persistence_aggregate_version (
        owner_uid, aggregate_kind, aggregate_id, sync_revision, revision, updated_at
      )
      SELECT $1, 'USER_PROFILE', $1, $4, $5, NOW()
      WHERE EXISTS (
        SELECT 1 FROM user_profile
        WHERE user_uid = $1
          AND active_portrait_asset_id IS NOT DISTINCT FROM $2
          AND sync_revision IS NOT DISTINCT FROM $3
      )
      ON CONFLICT (owner_uid, aggregate_kind, aggregate_id) DO UPDATE SET
        sync_revision = EXCLUDED.sync_revision,
        revision = EXCLUDED.revision,
        updated_at = NOW()
      WHERE persistence_aggregate_version.sync_revision IS NOT DISTINCT FROM $3
      RETURNING aggregate_id
    """
    params: [
      $ownerUid
      $expectedActivePortraitAssetId
      $expectedSyncRevision
      $newSyncRevision
      $newRevision
    ]
  ) @check(expr: "this != null", message: "User profile compare-and-swap failed")
  userPortrait_updateMany(
    where: { userUid: { eq: $ownerUid }, active: { eq: true } }
    data: { active: false, updatedAt_expr: "request.time" }
  )
  userPortrait_upsert(
    data: {
      assetId: $assetId
      userUid: $ownerUid
      prompt: $prompt
      description: $description
      daoRank: $daoRank
      daoXp: $daoXp
      powerStage: $powerStage
      equippedInventoryItemId: $equippedInventoryItemId
      usedReferenceImage: $usedReferenceImage
      frameId: $frameId
      glowId: $glowId
      bannerId: $bannerId
      effectIds: $effectIds
      active: true
      updatedAt_expr: "request.time"
    }
  )
  userProfile_update(
    first: {
      where: {
        userUid: { eq: $ownerUid }
        activePortraitAssetId: { eq: $expectedActivePortraitAssetId }
        syncRevision: { eq: $expectedSyncRevision }
      }
    }
    data: {
      activePortraitAssetId: $assetId
      syncRevision: $newSyncRevision
      revision: $newRevision
      updatedAt_expr: "request.time"
    }
  ) @check(expr: "this != null", message: "Profile revision changed")
  persistenceReceipt_insert(
    data: {
      ownerUid: $ownerUid
      idempotencyKey: $idempotencyKey
      operation: "SELECT_USER_PORTRAIT"
      resultingSyncRevision: $newSyncRevision
      resultingRevision: $newRevision
    }
  )
}

mutation AdminEnsureMediaDeletionIntent(
  $taskId: UUID!
  $ownerUid: String!
  $assetId: UUID!
  $storyId: UUID
  $idempotencyKey: String!
  $bucket: String!
  $objectKey: String!
  $reason: String!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    asset: mediaAsset(first: { where: { id: { eq: $assetId }, ownerUid: { eq: $ownerUid } } })
      @check(expr: "this != null", message: "Asset not found") {
      storyId @check(expr: "this == vars.storyId", message: "Asset story scope mismatch")
      status @check(expr: "this in ['READY', 'ARCHIVED']", message: "Only quota-committed media can use deletion intents")
      bucket @check(expr: "this == vars.bucket", message: "Asset bucket mismatch")
      objectKey
        @check(expr: "this == vars.objectKey", message: "Asset object key mismatch")
        @check(
          expr: "this.startsWith('user-media/private/') || this.startsWith('user-media/public/')"
          message: "Asset is outside the isolated user-media namespace"
        )
    }
  }
  mediaSlot_deleteMany(where: { ownerUid: { eq: $ownerUid }, currentAssetId: { eq: $assetId } })
  mediaAttachment_updateMany(
    where: { assetId: { eq: $assetId }, isCurrent: { eq: true } }
    data: { isCurrent: false, endedAt_expr: "request.time" }
  )
  mediaAsset_update(
    id: $assetId
    data: { status: PENDING_CLEANUP, cleanupAfter_expr: "request.time", updatedAt_expr: "request.time" }
  )
  mediaDeletionIntent_upsert(
    data: {
      ownerUid: $ownerUid
      idempotencyKey: $idempotencyKey
      assetId: $assetId
      storyId: $storyId
      reason: $reason
      status: PENDING
      updatedAt_expr: "request.time"
    }
  )
  mediaCleanupTask_upsert(
    data: {
      id: $taskId
      assetId: $assetId
      ownerUid: $ownerUid
      bucket: $bucket
      objectKey: $objectKey
      reason: $reason
      idempotencyKey: $idempotencyKey
      status: PENDING
      nextAttemptAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
}

mutation AdminClaimMediaCleanupTask(
  $taskId: UUID!
  $assetId: UUID!
  $ownerUid: String!
  $idempotencyKey: String!
  $leaseOwner: String!
  $leaseExpiresAt: Timestamp!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    task: mediaCleanupTask(
      first: {
        where: {
          id: { eq: $taskId }
          assetId: { eq: $assetId }
          ownerUid: { eq: $ownerUid }
          idempotencyKey: { eq: $idempotencyKey }
        }
      }
    ) @check(expr: "this != null", message: "Cleanup task intent mismatch") {
      assetId
    }
    intent: mediaDeletionIntent(
      first: {
        where: {
          ownerUid: { eq: $ownerUid }
          idempotencyKey: { eq: $idempotencyKey }
          assetId: { eq: $assetId }
        }
      }
    )
      @check(expr: "this != null", message: "Deletion intent not found") {
      assetId
    }
  }
  mediaCleanupTask_update(
    first: {
      where: {
        _and: [
          { id: { eq: $taskId } }
          { assetId: { eq: $assetId } }
          { ownerUid: { eq: $ownerUid } }
          { idempotencyKey: { eq: $idempotencyKey } }
          {
            _or: [
              { status: { in: [PENDING, FAILED] } }
              { status: { eq: RUNNING }, leaseExpiresAt: { lt_expr: "request.time" } }
            ]
          }
          {
            _or: [
              { leaseExpiresAt: { isNull: true } }
              { leaseExpiresAt: { lt_expr: "request.time" } }
            ]
          }
        ]
      }
    }
    data: {
      status: RUNNING
      leaseOwner: $leaseOwner
      leaseExpiresAt: $leaseExpiresAt
      attemptCount_update: { inc: 1 }
      updatedAt_expr: "request.time"
    }
  ) @check(expr: "this != null", message: "Cleanup task is not claimable")
  mediaDeletionIntent_update(
    key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    data: { status: RUNNING, lastError: null, updatedAt_expr: "request.time" }
  )
}

mutation AdminCompleteMediaDeletionIntent(
  $taskId: UUID!
  $assetId: UUID!
  $ownerUid: String!
  $idempotencyKey: String!
  $leaseOwner: String!
) @auth(level: NO_ACCESS) @transaction {
  completed: _execute(
    sql: """
      WITH asset_info AS (
        SELECT id, owner_uid, story_id, byte_size
        FROM media_asset
        WHERE id = $2 AND owner_uid = $3 AND status = 'PENDING_CLEANUP'
      ), completed_task AS (
        UPDATE media_cleanup_task
        SET status = 'SUCCEEDED', completed_at = NOW(), lease_owner = NULL,
            lease_expires_at = NULL, updated_at = NOW()
        WHERE id = $1 AND asset_id = $2 AND owner_uid = $3
          AND idempotency_key = $4 AND lease_owner = $5 AND status = 'RUNNING'
        RETURNING asset_id
      ), completed_intent AS (
        UPDATE media_deletion_intent
        SET status = 'SUCCEEDED', completed_at = NOW(), updated_at = NOW()
        WHERE owner_uid = $3 AND idempotency_key = $4 AND asset_id = $2
          AND EXISTS (SELECT 1 FROM completed_task)
        RETURNING asset_id
      ), user_usage AS (
        UPDATE user_storage_usage AS usage
        SET used_bytes = GREATEST(0, usage.used_bytes - asset_info.byte_size),
            asset_count = GREATEST(0, usage.asset_count - 1),
            revision = usage.revision + 1,
            updated_at = NOW()
        FROM asset_info
        WHERE usage.user_uid = $3
          AND EXISTS (SELECT 1 FROM completed_intent)
        RETURNING usage.user_uid
      ), story_usage AS (
        UPDATE story_storage_usage AS usage
        SET used_bytes = GREATEST(0, usage.used_bytes - asset_info.byte_size),
            asset_count = GREATEST(0, usage.asset_count - 1),
            updated_at = NOW()
        FROM asset_info
        WHERE usage.story_id = asset_info.story_id
          AND EXISTS (SELECT 1 FROM completed_intent)
        RETURNING usage.story_id
      )
      UPDATE media_asset
      SET status = 'DELETED', deleted_at = NOW(), updated_at = NOW()
      WHERE id = $2 AND owner_uid = $3
        AND EXISTS (SELECT 1 FROM completed_intent)
    """
    params: [$taskId, $assetId, $ownerUid, $idempotencyKey, $leaseOwner]
  ) @check(expr: "this == 1", message: "Cleanup task or deletion intent is not completable")
}

mutation AdminFailMediaDeletionIntent(
  $taskId: UUID!
  $ownerUid: String!
  $idempotencyKey: String!
  $leaseOwner: String!
  $lastError: String!
  $nextAttemptAt: Timestamp!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    mediaCleanupTask(
      first: { where: { id: { eq: $taskId }, ownerUid: { eq: $ownerUid }, leaseOwner: { eq: $leaseOwner }, status: { eq: RUNNING } } }
    ) @check(expr: "this != null", message: "Cleanup task lease not held") {
      id
    }
  }
  mediaCleanupTask_update(
    id: $taskId
    data: {
      status: FAILED
      lastError: $lastError
      nextAttemptAt: $nextAttemptAt
      leaseOwner: null
      leaseExpiresAt: null
      updatedAt_expr: "request.time"
    }
  )
  mediaDeletionIntent_update(
    key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    data: { status: FAILED, lastError: $lastError, updatedAt_expr: "request.time" }
  )
}

mutation AdminUpsertStorySeedBatch(
  $ownerUid: String!
  $idempotencyKey: String!
  $requestHash: String
  $seedIds: [UUID!]!
  $seeds: [StorySeed_Data!]!
    @allow(fields: "id ownerUid legacySeedId clientSeedId title schemaVersion syncRevision revision deletedAt createdAt updatedAt")
  $fields: [StorySeedField_Data!]!
    @allow(fields: "seedId section fieldKey position stringValue numberValue booleanValue")
  $entityIds: [UUID!]!
  $entities: [StorySeedEntity_Data!]!
    @allow(fields: "id seedId entityKind clientEntityId position name age skinTone eyeColor powerType rankLevel role powerLevel alignment connectionToMainCharacter description")
  $entityAliases: [StorySeedEntityAlias_Data!]!
    @allow(fields: "seedEntityId alias normalizedAlias position")
) @retired(reason: "Admin-only atomic seed-batch inputs are invoked with firebase-admin DataConnect")
  @auth(level: NO_ACCESS)
  @transaction {
  query @redact {
    owner: userAccount(key: { uid: $ownerUid })
      @check(expr: "this != null", message: "Seed owner not found") {
      uid
    }
    foreignSeed: storySeed(
      first: { where: { id: { in: $seedIds }, ownerUid: { ne: $ownerUid } } }
    ) @check(expr: "this == null", message: "Seed batch contains an ID owned by another account") {
      id
    }
    duplicate: persistenceReceipt(
      key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    ) @check(expr: "this == null", message: "Idempotency key already completed") {
      idempotencyKey
    }
  }
  storySeedEntityAlias_deleteMany(
    where: { seedEntity: { seedId: { in: $seedIds } } }
  )
  storySeedField_deleteMany(where: { seedId: { in: $seedIds } })
  storySeedEntity_deleteMany(
    where: { seedId: { in: $seedIds }, id: { nin: $entityIds } }
  )
  storySeed_upsertMany(data: $seeds)
  storySeedField_upsertMany(data: $fields)
  storySeedEntity_upsertMany(data: $entities)
  storySeedEntityAlias_upsertMany(data: $entityAliases)
  persistenceReceipt_insert(
    data: {
      ownerUid: $ownerUid
      idempotencyKey: $idempotencyKey
      operation: "UPSERT_STORY_SEED_BATCH"
      requestHash: $requestHash
    }
  )
}

mutation AdminDeleteOwnedStorySeed(
  $ownerUid: String!
  $seedId: UUID!
  $idempotencyKey: String!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    existing: storySeed(
      first: {
        where: { id: { eq: $seedId }, ownerUid: { eq: $ownerUid }, deletedAt: { isNull: true } }
      }
    ) @check(expr: "this != null", message: "Story seed not found") {
      id
    }
    duplicate: persistenceReceipt(
      key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    ) @check(expr: "this == null", message: "Idempotency key already completed") {
      idempotencyKey
    }
  }
  story_updateMany(
    where: { ownerUid: { eq: $ownerUid }, sourceSeedId: { eq: $seedId } }
    data: { sourceSeedId: null, updatedAt_expr: "request.time" }
  )
  storySeed_update(
    first: {
      where: { id: { eq: $seedId }, ownerUid: { eq: $ownerUid }, deletedAt: { isNull: true } }
    }
    data: {
      syncRevision: $idempotencyKey
      revision_update: { inc: 1 }
      deletedAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  ) @check(expr: "this != null", message: "Story seed was already deleted")
  seedVersionRecorded: _execute(
    sql: """
      INSERT INTO persistence_aggregate_version (
        owner_uid, aggregate_kind, aggregate_id, sync_revision, revision, updated_at
      )
      SELECT owner_uid, 'STORY_SEED', CAST(id AS text), sync_revision, revision, NOW()
      FROM story_seed
      WHERE id = $1 AND owner_uid = $2 AND deleted_at IS NOT NULL
      ON CONFLICT (owner_uid, aggregate_kind, aggregate_id) DO UPDATE SET
        sync_revision = EXCLUDED.sync_revision,
        revision = EXCLUDED.revision,
        updated_at = NOW()
    """
    params: [$seedId, $ownerUid]
  ) @check(expr: "this == 1", message: "Story seed deletion version was not recorded")
  persistenceReceipt_insert(
    data: {
      ownerUid: $ownerUid
      idempotencyKey: $idempotencyKey
      operation: "DELETE_STORY_SEED"
      seedId: $seedId
      resultingSyncRevision: $idempotencyKey
    }
  )
}

