mutation AdminPurgeExpiredStoryTombstone(
  $jobId: UUID!
  $storyId: UUID!
  $completedBefore: Timestamp!
) @auth(level: NO_ACCESS) @transaction {
  eligibleTombstone: _executeReturningFirst(
    sql: """
      SELECT j.story_id AS id
      FROM story_deletion_job j
      JOIN story s ON s.id = j.story_id
      WHERE j.id = $1
        AND j.story_id = $2
        AND j.status = 'SUCCEEDED'::story_deletion_status
        AND j.completed_at <= $3
        AND s.status = 'DELETED'::story_status
    """
    params: [$jobId, $storyId, $completedBefore]
  ) @check(expr: "this != null", message: "Expired story tombstone could not be purged")
  story_delete(id: $storyId)
    @check(expr: "this != null", message: "Expired story tombstone could not be deleted")
}

mutation AdminReserveStorageQuota(
  $reservationId: UUID!
  $ownerUid: String!
  $storyId: UUID
  $idempotencyKey: String!
  $requestedBytes: Int64!
  $hardLimitBytes: Int64!
  $expiresAt: Timestamp!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    duplicate: storageQuotaReservation(
      first: { where: { ownerUid: { eq: $ownerUid }, idempotencyKey: { eq: $idempotencyKey } } }
    ) @check(expr: "this == null", message: "Quota idempotency key already reserved") {
      id
    }
    storyScope: story(first: { where: { id: { eq: $storyId }, ownerUid: { eq: $ownerUid } } })
      @check(
        expr: "vars.storyId == null || (this != null && this.id == vars.storyId && this.status != 'DELETED')"
        message: "Story scope not found or deleted"
      ) {
      id
      status
    }
  }
  quota: _executeReturningFirst(
    sql: """
      INSERT INTO user_storage_usage (
        user_uid, hard_limit_bytes, used_bytes, reserved_bytes, asset_count, revision, updated_at
      )
      SELECT $1, $3, 0, $2, 0, 1, NOW()
      WHERE $2 <= $3
      ON CONFLICT (user_uid) DO UPDATE SET
        hard_limit_bytes = EXCLUDED.hard_limit_bytes,
        reserved_bytes = user_storage_usage.reserved_bytes + EXCLUDED.reserved_bytes,
        revision = user_storage_usage.revision + 1,
        updated_at = NOW()
      WHERE user_storage_usage.used_bytes + user_storage_usage.reserved_bytes + EXCLUDED.reserved_bytes
        <= EXCLUDED.hard_limit_bytes
      RETURNING user_uid, used_bytes, reserved_bytes, hard_limit_bytes, revision
    """
    params: [$ownerUid, $requestedBytes, $hardLimitBytes]
  ) @check(expr: "this != null", message: "Storage quota exceeded")
  storageQuotaReservation_insert(
    data: {
      id: $reservationId
      ownerUid: $ownerUid
      storyId: $storyId
      idempotencyKey: $idempotencyKey
      requestedBytes: $requestedBytes
      status: RESERVED
      expiresAt: $expiresAt
    }
  )
}

mutation AdminReleaseStorageQuotaReservation(
  $reservationId: UUID!
  $ownerUid: String!
) @auth(level: NO_ACCESS) @transaction {
  released: _execute(
    sql: """
      WITH released AS (
        UPDATE storage_quota_reservation
        SET status = 'RELEASED', completed_at = NOW(), updated_at = NOW()
        WHERE id = $1 AND owner_uid = $2 AND status = 'RESERVED'
        RETURNING requested_bytes
      )
      UPDATE user_storage_usage AS usage
      SET reserved_bytes = GREATEST(0, usage.reserved_bytes - released.requested_bytes),
          revision = usage.revision + 1,
          updated_at = NOW()
      FROM released
      WHERE usage.user_uid = $2
    """
    params: [$reservationId, $ownerUid]
  ) @check(expr: "this == 1", message: "Quota reservation is not releasable")
}

mutation AdminReserveMediaAssetIdempotent(
  $id: UUID!
  $ownerUid: String!
  $storyId: UUID
  $generationJobId: UUID
  $replacesAssetId: UUID
  $quotaReservationId: UUID!
  $idempotencyKey: String!
  $requestHash: String!
  $assetType: MediaAssetType!
  $purpose: String!
  $visibility: MediaVisibility!
  $bucket: String!
  $objectKey: String!
  $originalFilename: String
  $mimeType: String!
  $extension: String!
  $byteSize: Int64!
  $checksumSha256: String!
  $width: Int
  $height: Int
  $durationMs: Int64
  $version: Int!
  $cacheControl: String!
  $sourceKind: String!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    reservation: storageQuotaReservation(
      first: {
        where: {
          id: { eq: $quotaReservationId }
          ownerUid: { eq: $ownerUid }
          idempotencyKey: { eq: $idempotencyKey }
          requestedBytes: { eq: $byteSize }
          status: { eq: RESERVED }
        }
      }
    ) @check(expr: "this != null", message: "Matching quota reservation not found") {
      id
    }
    duplicate: mediaUploadReceipt(
      key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    ) @check(expr: "this == null", message: "Upload idempotency key already reserved") {
      assetId
    }
    storyScope: story(first: { where: { id: { eq: $storyId }, ownerUid: { eq: $ownerUid } } })
      @check(
        expr: "vars.storyId == null || (this != null && this.id == vars.storyId && this.status != 'DELETED')"
        message: "Story scope not found or deleted"
      ) {
      id
      status
    }
  }
  mediaAsset_insert(
    data: {
      id: $id
      ownerUid: $ownerUid
      storyId: $storyId
      generationJobId: $generationJobId
      replacesAssetId: $replacesAssetId
      uploadOperationId: $idempotencyKey
      assetType: $assetType
      purpose: $purpose
      visibility: $visibility
      status: UPLOADING
      bucket: $bucket
      objectKey: $objectKey
      originalFilename: $originalFilename
      mimeType: $mimeType
      extension: $extension
      byteSize: $byteSize
      checksumSha256: $checksumSha256
      width: $width
      height: $height
      durationMs: $durationMs
      version: $version
      cacheControl: $cacheControl
    }
  )
  storageQuotaReservation_update(
    id: $quotaReservationId
    data: { assetId: $id, updatedAt_expr: "request.time" }
  )
  mediaUploadAttempt_insert(
    data: {
      assetId: $id
      attemptNumber: 1
      sourceKind: $sourceKind
      status: "uploading"
    }
  )
  mediaUploadReceipt_insert(
    data: {
      ownerUid: $ownerUid
      idempotencyKey: $idempotencyKey
      assetId: $id
      requestHash: $requestHash
      status: "uploading"
    }
  )
}

mutation AdminCommitMediaAssetToSlot(
  $id: UUID!
  $ownerUid: String!
  $quotaReservationId: UUID!
  $idempotencyKey: String!
  $etag: String
  $storyId: UUID
  $chapterId: UUID
  $entityId: UUID
  $targetKind: String!
  $targetKey: String!
  $purpose: String!
  $attachmentId: UUID!
  $historyEntityType: String
  $clientHistoryId: String
  $promptUsed: String
  $chapterNumber: Int
  $arcTitle: String
  $label: String
  $position: Int!
  $expectedCurrentAssetId: UUID
  $expectedSlotVersion: Int64
  $newSlotVersion: Int64!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    asset: mediaAsset(first: { where: { id: { eq: $id }, ownerUid: { eq: $ownerUid } } })
      @check(expr: "this != null", message: "Asset not found") {
      status @check(expr: "this == 'UPLOADING'", message: "Asset is not uploading")
      storyId @check(expr: "this == vars.storyId", message: "Asset story scope mismatch")
      story {
        status @check(expr: "this != 'DELETED'", message: "Cannot attach media to a deleted story")
      }
    }
    slot: mediaSlot(
      key: {
        ownerUid: $ownerUid
        targetKind: $targetKind
        targetKey: $targetKey
        purpose: $purpose
      }
    ) @check(
      expr: "(this == null && vars.expectedCurrentAssetId == null) || (this != null && this.currentAssetId == vars.expectedCurrentAssetId && this.version == vars.expectedSlotVersion)"
      message: "Media slot expected version is stale"
    ) {
      currentAssetId
      version
    }
  }
  mediaAttachment_updateMany(
    where: {
      asset: { ownerUid: { eq: $ownerUid } }
      targetKind: { eq: $targetKind }
      targetKey: { eq: $targetKey }
      purpose: { eq: $purpose }
      isCurrent: { eq: true }
    }
    data: { isCurrent: false, endedAt_expr: "request.time" }
  )
  mediaAsset_update(
    id: $id
    data: { status: READY, etag: $etag, readyAt_expr: "request.time", updatedAt_expr: "request.time" }
  )
  mediaAttachment_upsert(
    data: {
      id: $attachmentId
      assetId: $id
      storyId: $storyId
      chapterId: $chapterId
      entityId: $entityId
      targetKind: $targetKind
      targetKey: $targetKey
      purpose: $purpose
      historyEntityType: $historyEntityType
      clientHistoryId: $clientHistoryId
      promptUsed: $promptUsed
      chapterNumber: $chapterNumber
      arcTitle: $arcTitle
      label: $label
      position: $position
      isCurrent: true
      endedAt: null
    }
  )
  mediaSlot_upsert(
    data: {
      ownerUid: $ownerUid
      storyId: $storyId
      chapterId: $chapterId
      entityId: $entityId
      targetKind: $targetKind
      targetKey: $targetKey
      purpose: $purpose
      currentAssetId: $id
      version: $newSlotVersion
      updatedAt_expr: "request.time"
    }
  )
  mediaUploadAttempt_updateMany(
    where: { assetId: { eq: $id }, status: { eq: "uploading" } }
    data: { status: "succeeded", completedAt_expr: "request.time" }
  )
  mediaUploadReceipt_update(
    key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    data: { status: "succeeded", updatedAt_expr: "request.time" }
  )
  committedQuota: _execute(
    sql: """
      WITH committed AS (
        UPDATE storage_quota_reservation
        SET status = 'COMMITTED', completed_at = NOW(), updated_at = NOW()
        WHERE id = $1 AND owner_uid = $2 AND asset_id = $3 AND status = 'RESERVED'
        RETURNING requested_bytes, story_id
      ), story_usage AS (
        INSERT INTO story_storage_usage (
          story_id, owner_uid, used_bytes, reserved_bytes, asset_count, updated_at
        )
        SELECT committed.story_id, $2, committed.requested_bytes, 0, 1, NOW()
        FROM committed
        WHERE committed.story_id IS NOT NULL
        ON CONFLICT (story_id) DO UPDATE SET
          used_bytes = story_storage_usage.used_bytes + EXCLUDED.used_bytes,
          asset_count = story_storage_usage.asset_count + 1,
          updated_at = NOW()
        RETURNING story_id
      )
      UPDATE user_storage_usage AS usage
      SET reserved_bytes = GREATEST(0, usage.reserved_bytes - committed.requested_bytes),
          used_bytes = usage.used_bytes + committed.requested_bytes,
          asset_count = usage.asset_count + 1,
          revision = usage.revision + 1,
          updated_at = NOW()
      FROM committed
      WHERE usage.user_uid = $2
    """
    params: [$quotaReservationId, $ownerUid, $id]
  ) @check(expr: "this == 1", message: "Quota reservation could not be committed")
}

mutation AdminSelectOwnedMediaSlotAsset(
  $assetId: UUID!
  $ownerUid: String!
  $storyId: UUID
  $chapterId: UUID
  $entityId: UUID
