  $voiceClips: [ChapterVoiceClip_Data!]!
    @allow(fields: "id chapterId blockId position speakerVoice assetId catalogId createdAt")
) @retired(reason: "Admin-only bulk graph inputs are invoked with firebase-admin DataConnect")
  @auth(level: NO_ACCESS)
  @transaction {
  query @redact {
    storyScope: story(first: { where: { id: { eq: $storyId }, ownerUid: { eq: $ownerUid } } })
      @check(
        expr: "this != null && this.status != 'DELETED' && this.syncRevision == vars.expectedSyncRevision"
        message: "Story is deleted or the expected revision is stale"
      ) {
      status
      syncRevision
    }
    chapterScope: chapter(
      first: {
        where: {
          id: { eq: $chapterId }
          storyId: { eq: $storyId }
          story: { ownerUid: { eq: $ownerUid }, status: { ne: DELETED } }
          status: { ne: DELETED }
        }
      }
    ) @check(expr: "this != null", message: "Chapter not found") {
      id
    }
    duplicate: persistenceReceipt(
      key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    ) @check(expr: "this == null", message: "Idempotency key already completed") {
      idempotencyKey
    }
  }

  storyVersionGuard: _executeReturningFirst(
    sql: """
      INSERT INTO persistence_aggregate_version (
        owner_uid, aggregate_kind, aggregate_id, sync_revision, revision, updated_at
      )
      SELECT $1, 'STORY', CAST($2 AS text), $4, $5, NOW()
      WHERE EXISTS (
        SELECT 1 FROM story
        WHERE id = $2 AND owner_uid = $1 AND status <> 'DELETED'
          AND sync_revision IS NOT DISTINCT FROM $3
      )
      ON CONFLICT (owner_uid, aggregate_kind, aggregate_id) DO UPDATE SET
        sync_revision = EXCLUDED.sync_revision,
        revision = EXCLUDED.revision,
        updated_at = NOW()
      WHERE persistence_aggregate_version.sync_revision IS NOT DISTINCT FROM $3
      RETURNING aggregate_id
    """
    params: [$ownerUid, $storyId, $expectedSyncRevision, $newSyncRevision, $newRevision]
  ) @check(expr: "this != null", message: "Story compare-and-swap failed")

  chapterBlockAttribute_deleteMany(where: { block: { chapterId: { eq: $chapterId } } })
  chapterBlockEntityMention_deleteMany(where: { block: { chapterId: { eq: $chapterId } } })
  chapterFactSupersession_deleteMany(
    where: { newerFact: { chapterId: { eq: $chapterId } } }
  )
  chapterVoiceClip_deleteMany(
    where: { chapterId: { eq: $chapterId }, id: { nin: $voiceClipIds } }
  )
  chapterBlock_deleteMany(
    where: { chapterId: { eq: $chapterId }, id: { nin: $blockIds } }
  )
  chapterTranslation_deleteMany(
    where: { chapterId: { eq: $chapterId }, languageCode: { nin: $translationLanguages } }
  )
  chapterSceneFingerprint_deleteMany(
    where: { chapterId: { eq: $chapterId }, id: { nin: $fingerprintIds } }
  )
  chapterFact_deleteMany(
    where: { chapterId: { eq: $chapterId }, id: { nin: $factIds } }
  )
  chapterAudioManifest_deleteMany(where: { chapterId: { eq: $chapterId } })

  story_update(
    first: {
      where: {
        id: { eq: $storyId }
        ownerUid: { eq: $ownerUid }
        status: { ne: DELETED }
        syncRevision: { eq: $expectedSyncRevision }
      }
    }
    data: {
      syncRevision: $newSyncRevision
      revision: $newRevision
      updatedAt_expr: "request.time"
    }
  ) @check(expr: "this != null", message: "Story revision changed")
  chapter_upsert(data: $chapter)
  chapterContent_upsert(data: $content)
  chapterBlock_upsertMany(data: $blocks)
  chapterBlockAttribute_upsertMany(data: $blockAttributes)
  chapterBlockEntityMention_upsertMany(data: $blockEntityMentions)
  chapterTranslation_upsertMany(data: $translations)
  chapterSceneFingerprint_upsertMany(data: $fingerprints)
  chapterFact_upsertMany(data: $facts)
  chapterFactSupersession_upsertMany(data: $factSupersessions)
  chapterAudioManifest_upsertMany(data: $audioManifests)
  chapterVoiceClip_upsertMany(data: $voiceClips)
  persistenceReceipt_insert(
    data: {
      ownerUid: $ownerUid
      idempotencyKey: $idempotencyKey
      operation: "UPSERT_CHAPTER_CONTENT_GRAPH"
      storyId: $storyId
      chapterId: $chapterId
      resultingSyncRevision: $newSyncRevision
      resultingRevision: $newRevision
      requestHash: $requestHash
    }
  )
  storyChange_insert(
    data: {
      ownerUid: $ownerUid
      storyId: $storyId
      changeKind: CHAPTER_UPDATED
      storyRevision: $newRevision
      syncRevision: $newSyncRevision
      idempotencyKey: $idempotencyKey
    }
  )
}

mutation AdminUpsertStorySeedGraph(
  $ownerUid: String!
  $seedId: UUID!
  $expectedSyncRevision: String
  $newSyncRevision: String!
  $newRevision: Int64!
  $idempotencyKey: String!
  $requestHash: String
  $seed: StorySeed_Data!
    @allow(fields: "id ownerUid legacySeedId clientSeedId title schemaVersion syncRevision revision deletedAt createdAt updatedAt")
  $fields: [StorySeedField_Data!]!
    @allow(fields: "seedId section fieldKey position stringValue numberValue booleanValue")
  $entityIds: [UUID!]!
  $entities: [StorySeedEntity_Data!]!
    @allow(fields: "id seedId entityKind clientEntityId position name age skinTone eyeColor powerType rankLevel role powerLevel alignment connectionToMainCharacter description")
  $entityAliases: [StorySeedEntityAlias_Data!]!
    @allow(fields: "seedEntityId alias normalizedAlias position")
) @retired(reason: "Admin-only bulk graph inputs are invoked with firebase-admin DataConnect")
  @auth(level: NO_ACCESS)
  @transaction {
  query @redact {
    existing: storySeed(first: { where: { id: { eq: $seedId }, ownerUid: { eq: $ownerUid } } })
      @check(
        expr: "this == null || (this.deletedAt == null && this.syncRevision == vars.expectedSyncRevision)"
        message: "Story seed is deleted or the expected revision is stale"
      ) {
      syncRevision
      deletedAt
    }
    duplicate: persistenceReceipt(
      key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    ) @check(expr: "this == null", message: "Idempotency key already completed") {
      idempotencyKey
    }
  }
  seedVersionGuard: _executeReturningFirst(
    sql: """
      INSERT INTO persistence_aggregate_version (
        owner_uid, aggregate_kind, aggregate_id, sync_revision, revision, updated_at
      )
      SELECT $1, 'STORY_SEED', CAST($2 AS text), $4, $5, NOW()
      WHERE (
        EXISTS (
          SELECT 1 FROM story_seed
          WHERE id = $2 AND owner_uid = $1 AND deleted_at IS NULL
            AND sync_revision IS NOT DISTINCT FROM $3
        )
        OR (
          $3 IS NULL
          AND NOT EXISTS (SELECT 1 FROM story_seed WHERE id = $2)
        )
      )
      ON CONFLICT (owner_uid, aggregate_kind, aggregate_id) DO UPDATE SET
        sync_revision = EXCLUDED.sync_revision,
        revision = EXCLUDED.revision,
        updated_at = NOW()
      WHERE persistence_aggregate_version.sync_revision IS NOT DISTINCT FROM $3
      RETURNING aggregate_id
    """
    params: [$ownerUid, $seedId, $expectedSyncRevision, $newSyncRevision, $newRevision]
  ) @check(expr: "this != null", message: "Story seed compare-and-swap failed")

  storySeedEntityAlias_deleteMany(where: { seedEntity: { seedId: { eq: $seedId } } })
  storySeedField_deleteMany(where: { seedId: { eq: $seedId } })
  storySeedEntity_deleteMany(where: { seedId: { eq: $seedId }, id: { nin: $entityIds } })
  storySeed_upsert(data: $seed)
  storySeedField_upsertMany(data: $fields)
  storySeedEntity_upsertMany(data: $entities)
  storySeedEntityAlias_upsertMany(data: $entityAliases)
  persistenceReceipt_insert(
    data: {
      ownerUid: $ownerUid
      idempotencyKey: $idempotencyKey
      operation: "UPSERT_STORY_SEED_GRAPH"
      seedId: $seedId
      resultingSyncRevision: $newSyncRevision
      resultingRevision: $newRevision
      requestHash: $requestHash
    }
  )
}

mutation AdminUpsertUserProfileGraph(
  $ownerUid: String!
  $expectedSyncRevision: String
  $newSyncRevision: String!
  $newRevision: Int64!
  $idempotencyKey: String!
  $requestHash: String
  $account: UserAccount_Data!
    @allow(fields: "uid email displayName updatedAt")
  $profile: UserProfile_Data!
    @allow(fields: "userUid username displayNameColor preferredLanguage defaultTranslationLanguage subscriptionTier legacyQi daoXp daoRank heavenlyQi sectQi demonicQi writingStreak savedStoryCount activePortraitAssetId imageGenerationCount imageQuotaResetAt lastSessionEnd daoPillarStreak daoPillarCracked lastReadDate lastInteractionDate equippedInventoryItemId syncRevision revision lastReadAt createdAt updatedAt")
  $preferences: [UserPreference_Data!]!
    @allow(fields: "userUid fontSize fontFamily lineHeightScale paragraphSpacingScale letterSpacing wordSpacing readingWidth textAlignment contextEngine theme colorPaletteId highlightStyle audioMusicVolume audioAtmosphereVolume audioVoiceVolume updatedAt")
  $inventoryIds: [UUID!]!
  $inventory: [UserInventoryItem_Data!]!
    @allow(fields: "id userUid clientItemId catalogItemId itemKind name description rarity status sourceStoryId sourceStoryTitle sourceMilestone milestoneType imageAssetId attributeBoost statusEffectDefinition offeringWeekId gatheredAt rewardValueQi rewardValueSectMerit acquiredAt updatedAt")
  $effectIds: [UUID!]!
  $effects: [UserStatusEffect_Data!]!
    @allow(fields: "id userUid clientEffectId sourceInventoryItemId name effectType description durationMs scope visual counterplay rewardHook qiMultiplier sectQiMultiplier appliedAt expiresAt progress targetProgress completedAt isUnlockedReward createdAt updatedAt")
  $progressEventIds: [UUID!]!
  $progressEvents: [UserProgressEvent_Data!]!
    @allow(fields: "id userUid eventType amount sourceType sourceId idempotencyKey createdAt")
) @retired(reason: "Admin-only bulk graph inputs are invoked with firebase-admin DataConnect")
  @auth(level: NO_ACCESS)
  @transaction {
  query @redact {
    existing: userProfile(key: { userUid: $ownerUid })
      @check(
        expr: "this == null || this.syncRevision == vars.expectedSyncRevision"
        message: "User profile expected revision is stale"
      ) {
      syncRevision
    }
    duplicate: persistenceReceipt(
      key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    ) @check(expr: "this == null", message: "Idempotency key already completed") {
      idempotencyKey
    }
  }
  # The account must exist before the version row can reference it. A failed
  # guard rolls this upsert back with the rest of the transaction.
  userAccount_upsert(data: $account)
  profileVersionGuard: _executeReturningFirst(
    sql: """
      INSERT INTO persistence_aggregate_version (
        owner_uid, aggregate_kind, aggregate_id, sync_revision, revision, updated_at
      )
      SELECT $1, 'USER_PROFILE', $1, $3, $4, NOW()
      WHERE (
        EXISTS (
          SELECT 1 FROM user_profile
          WHERE user_uid = $1 AND sync_revision IS NOT DISTINCT FROM $2
        )
        OR (
          $2 IS NULL
          AND NOT EXISTS (SELECT 1 FROM user_profile WHERE user_uid = $1)
        )
      )
      ON CONFLICT (owner_uid, aggregate_kind, aggregate_id) DO UPDATE SET
        sync_revision = EXCLUDED.sync_revision,
        revision = EXCLUDED.revision,
        updated_at = NOW()
      WHERE persistence_aggregate_version.sync_revision IS NOT DISTINCT FROM $2
      RETURNING aggregate_id
    """
    params: [$ownerUid, $expectedSyncRevision, $newSyncRevision, $newRevision]
  ) @check(expr: "this != null", message: "User profile compare-and-swap failed")
  userStatusEffect_deleteMany(
    where: { userUid: { eq: $ownerUid }, id: { nin: $effectIds } }
  )
  userInventoryItem_deleteMany(
    where: { userUid: { eq: $ownerUid }, id: { nin: $inventoryIds } }
  )
  userProgressEvent_deleteMany(
    where: { userUid: { eq: $ownerUid }, id: { nin: $progressEventIds } }
  )
  userPreference_deleteMany(where: { userUid: { eq: $ownerUid } })
  userInventoryItem_upsertMany(data: $inventory)
  userStatusEffect_upsertMany(data: $effects)
  userProgressEvent_upsertMany(data: $progressEvents)
  userProfile_upsert(data: $profile)
  userPreference_upsertMany(data: $preferences)
  persistenceReceipt_insert(
    data: {
      ownerUid: $ownerUid
      idempotencyKey: $idempotencyKey
      operation: "UPSERT_USER_PROFILE_GRAPH"
      resultingSyncRevision: $newSyncRevision
      resultingRevision: $newRevision
      requestHash: $requestHash
    }
  )
}

