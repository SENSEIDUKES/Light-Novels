mutation UpsertMyAccount @auth(level: USER) {
  userAccount_upsert(
    data: {
      uid_expr: "auth.uid"
      updatedAt_expr: "request.time"
    }
  )
}

mutation CreateFoundationProbe($label: String!) @auth(level: USER) @transaction {
  userAccount_upsert(
    data: {
      uid_expr: "auth.uid"
      updatedAt_expr: "request.time"
    }
  )
  foundationProbe_insert(data: { ownerUid_expr: "auth.uid", label: $label })
}

mutation DeleteMyFoundationProbe($id: UUID!) @auth(level: USER) {
  foundationProbe_delete(
    first: { where: { id: { eq: $id }, ownerUid: { eq_expr: "auth.uid" } } }
  )
}

mutation CreateStoryWithFirstChapter(
  $title: String!
  $genre: String!
  $mainCharacterName: String
  $premise: String
  $chapterTitle: String!
  $chapterPremise: String
) @auth(level: USER) @transaction {
  userAccount_upsert(
    data: {
      uid_expr: "auth.uid"
      updatedAt_expr: "request.time"
    }
  )
  story_insert(
    data: {
      ownerUid_expr: "auth.uid"
      title: $title
      genre: $genre
      mainCharacterName: $mainCharacterName
      premise: $premise
      status: ACTIVE
      currentChapterNumber: 1
    }
  )
  storyMember_insert(
    data: {
      storyId_expr: "response.story_insert.id"
      userUid_expr: "auth.uid"
      role: OWNER
    }
  )
  chapter_insert(
    data: {
      storyId_expr: "response.story_insert.id"
      chapterNumber: 1
      title: $chapterTitle
      premise: $chapterPremise
      status: UNLOCKED
    }
  )
}

mutation CreateMyChapter(
  $storyId: UUID!
  $chapterNumber: Int!
  $title: String!
  $premise: String
) @auth(level: USER) @transaction {
  query @redact {
    story(
      first: {
        where: {
          id: { eq: $storyId }
          ownerUid: { eq_expr: "auth.uid" }
          status: { ne: DELETED }
        }
      }
    )
      @check(expr: "this != null", message: "Story not found") {
      id
    }
  }
  chapter_insert(
    data: {
      storyId: $storyId
      chapterNumber: $chapterNumber
      title: $title
      premise: $premise
      status: UNLOCKED
    }
  )
}

mutation SoftDeleteMyStory($id: UUID!) @auth(level: USER) {
  story_update(
    first: { where: { id: { eq: $id }, ownerUid: { eq_expr: "auth.uid" } } }
    data: { status: DELETED, deletedAt_expr: "request.time", updatedAt_expr: "request.time" }
  )
}

# Test-only/admin cleanup. It is unavailable to all client SDK callers.
mutation AdminPurgeFoundationProbe($id: UUID!) @auth(level: NO_ACCESS) {
  foundationProbe_delete(id: $id)
}

mutation AdminPurgeFoundationStory($id: UUID!) @auth(level: NO_ACCESS) {
  story_delete(id: $id)
}

mutation AdminReserveMediaAsset(
  $id: UUID!
  $ownerUid: String!
  $ownerEmail: String
  $ownerDisplayName: String
  $storyId: UUID
  $generationJobId: UUID
  $replacesAssetId: UUID
  $assetType: MediaAssetType!
  $purpose: String!
  $visibility: MediaVisibility!
  $bucket: String!
  $objectKey: String!
  $originalFilename: String
  $mimeType: String!
  $extension: String!
  $byteSize: Int64!
  $checksumSha256: String!
  $width: Int
  $height: Int
  $durationMs: Int64
  $version: Int!
  $cacheControl: String!
  $sourceKind: String!
) @auth(level: NO_ACCESS) @transaction {
  userAccount_upsert(
    data: {
      uid: $ownerUid
      email: $ownerEmail
      displayName: $ownerDisplayName
      updatedAt_expr: "request.time"
    }
  )
  mediaAsset_insert(
    data: {
      id: $id
      ownerUid: $ownerUid
      storyId: $storyId
      generationJobId: $generationJobId
      replacesAssetId: $replacesAssetId
      assetType: $assetType
      purpose: $purpose
      visibility: $visibility
      status: UPLOADING
      bucket: $bucket
      objectKey: $objectKey
      originalFilename: $originalFilename
      mimeType: $mimeType
      extension: $extension
      byteSize: $byteSize
      checksumSha256: $checksumSha256
      width: $width
      height: $height
      durationMs: $durationMs
      version: $version
      cacheControl: $cacheControl
    }
  )
  mediaUploadAttempt_insert(
    data: {
      assetId: $id
      attemptNumber: 1
      sourceKind: $sourceKind
      status: "uploading"
    }
  )
}

mutation AdminCommitMediaAssetReady(
  $id: UUID!
  $ownerUid: String!
  $etag: String
  $targetKind: String!
  $targetKey: String!
  $purpose: String!
  $storyId: UUID
  $chapterId: UUID
  $entityId: UUID
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    mediaAsset(first: { where: { id: { eq: $id }, ownerUid: { eq: $ownerUid } } })
      @check(expr: "this != null", message: "Asset not found") {
      status @check(expr: "this == 'UPLOADING'", message: "Asset is not uploading")
    }
  }
  assetReady: mediaAsset_update(
    id: $id
    data: { status: READY, etag: $etag, readyAt_expr: "request.time", updatedAt_expr: "request.time" }
  )
  mediaAttachment_insert(
    data: {
      assetId: $id
      storyId: $storyId
      chapterId: $chapterId
      entityId: $entityId
      targetKind: $targetKind
      targetKey: $targetKey
      purpose: $purpose
      isCurrent: true
    }
  )
  mediaUploadAttempt_updateMany(
    where: { assetId: { eq: $id }, status: { eq: "uploading" } }
    data: { status: "succeeded", completedAt_expr: "request.time" }
  )
}

mutation AdminCommitMediaAssetReplacement(
  $id: UUID!
  $ownerUid: String!
  $replacesAssetId: UUID!
  $replacesBucket: String!
  $replacesObjectKey: String!
  $etag: String
  $targetKind: String!
  $targetKey: String!
  $purpose: String!
  $storyId: UUID
  $chapterId: UUID
  $entityId: UUID
  $cleanupAfter: Timestamp!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    replacement: mediaAsset(first: { where: { id: { eq: $id }, ownerUid: { eq: $ownerUid } } })
      @check(expr: "this != null", message: "Replacement asset not found") {
      status @check(expr: "this == 'UPLOADING'", message: "Replacement is not uploading")
    }
    current: mediaAsset(first: { where: { id: { eq: $replacesAssetId }, ownerUid: { eq: $ownerUid } } })
      @check(expr: "this != null", message: "Current asset not found") {
      status @check(expr: "this == 'READY'", message: "Current asset is not ready")
      bucket
      objectKey
    }
  }
  replacementReady: mediaAsset_update(
    id: $id
    data: { status: READY, etag: $etag, readyAt_expr: "request.time", updatedAt_expr: "request.time" }
  )
  mediaAttachment_updateMany(
    where: {
      assetId: { eq: $replacesAssetId }
      targetKind: { eq: $targetKind }
      targetKey: { eq: $targetKey }
      purpose: { eq: $purpose }
      isCurrent: { eq: true }
    }
    data: { isCurrent: false, endedAt_expr: "request.time" }
  ) @check(expr: "this == 1", message: "Replacement attachment slot not found")
  mediaAttachment_insert(
    data: {
      assetId: $id
      storyId: $storyId
      chapterId: $chapterId
      entityId: $entityId
      targetKind: $targetKind
      targetKey: $targetKey
      purpose: $purpose
      isCurrent: true
    }
  )
  archivedPrevious: mediaAsset_update(
    id: $replacesAssetId
    data: {
      status: ARCHIVED
      archivedAt_expr: "request.time"
      cleanupAfter: $cleanupAfter
      updatedAt_expr: "request.time"
    }
  )
  mediaCleanupTask_insert(
    data: {
      assetId: $replacesAssetId
      ownerUid: $ownerUid
      bucket: $replacesBucket
      objectKey: $replacesObjectKey
      reason: "replacement-retention-expired"
      nextAttemptAt: $cleanupAfter
    }
  )
  mediaUploadAttempt_updateMany(
    where: { assetId: { eq: $id }, status: { eq: "uploading" } }
    data: { status: "succeeded", completedAt_expr: "request.time" }
  )
}

mutation AdminMarkMediaAssetFailed(
  $id: UUID!
  $ownerUid: String!
  $failureCode: String!
  $failureMessage: String!
) @auth(level: NO_ACCESS) @transaction {
  mediaAsset_update(
    first: {
      where: {
        id: { eq: $id }
        ownerUid: { eq: $ownerUid }
        status: { eq: UPLOADING }
      }
    }
    data: {
      status: FAILED
      failureCode: $failureCode
      failureMessage: $failureMessage
      updatedAt_expr: "request.time"
    }
  ) @check(expr: "this != null", message: "Asset not found")
  mediaUploadAttempt_updateMany(
    where: { assetId: { eq: $id }, status: { eq: "uploading" } }
    data: { status: "failed", errorCode: $failureCode, errorMessage: $failureMessage, completedAt_expr: "request.time" }
  )
}

mutation AdminMarkMediaAssetPendingCleanup(
  $id: UUID!
  $ownerUid: String!
  $bucket: String!
  $objectKey: String!
  $reason: String!
  $failureMessage: String
) @auth(level: NO_ACCESS) @transaction {
  mediaAsset_update(
    first: {
      where: {
        id: { eq: $id }
        ownerUid: { eq: $ownerUid }
        status: { eq: UPLOADING }
      }
    }
    data: {
      status: PENDING_CLEANUP
      failureCode: "commit_failed_after_upload"
      failureMessage: $failureMessage
      cleanupAfter_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  ) @check(expr: "this != null", message: "Asset not found")
  mediaCleanupTask_insert(
    data: {
      assetId: $id
      ownerUid: $ownerUid
      bucket: $bucket
      objectKey: $objectKey
      reason: $reason
    }
  )
}

mutation AdminRequestMediaAssetDeletion(
  $id: UUID!
  $ownerUid: String!
  $bucket: String!
  $objectKey: String!
) @auth(level: NO_ACCESS) @transaction {
  mediaAsset_update(
    first: { where: { id: { eq: $id }, ownerUid: { eq: $ownerUid } } }
    data: { status: PENDING_CLEANUP, cleanupAfter_expr: "request.time", updatedAt_expr: "request.time" }
  ) @check(expr: "this != null", message: "Asset not found")
  mediaAttachment_updateMany(
    where: { assetId: { eq: $id }, isCurrent: { eq: true } }
    data: { isCurrent: false, endedAt_expr: "request.time" }
  )
  mediaCleanupTask_insert(
    data: {
      assetId: $id
      ownerUid: $ownerUid
      bucket: $bucket
      objectKey: $objectKey
      reason: "user-delete"
    }
  )
}

mutation AdminCompleteMediaCleanup($taskId: UUID!, $assetId: UUID!) @auth(level: NO_ACCESS) @transaction {
  mediaCleanupTask_update(
    id: $taskId
    data: { status: SUCCEEDED, completedAt_expr: "request.time", updatedAt_expr: "request.time" }
  )
  mediaAsset_update(
    id: $assetId
    data: { status: DELETED, deletedAt_expr: "request.time", updatedAt_expr: "request.time" }
  )
}

mutation AdminFailMediaCleanup(
  $taskId: UUID!
  $lastError: String!
  $nextAttemptAt: Timestamp!
) @auth(level: NO_ACCESS) {
  mediaCleanupTask_update(
    id: $taskId
    data: {
      status: FAILED
      attemptCount_update: { inc: 1 }
      lastError: $lastError
      nextAttemptAt: $nextAttemptAt
      updatedAt_expr: "request.time"
    }
  )
}

mutation AdminUpsertStoryGraph(
  $ownerUid: String!
  $storyId: UUID!
  $expectedSyncRevision: String
  $newSyncRevision: String!
  $newRevision: Int64!
  $idempotencyKey: String!
  $requestHash: String
  $story: Story_Data!
    @allow(fields: "id ownerUid sourceSeedId parentStoryId legacyStoryId clientStoryId title genre mainCharacterName premise status visibility currentChapterNumber forkChapterNumber syncRevision revision schemaVersion lastImageChapter evolutionReady evolutionReason availableVisualUpdate isEdited conflictResolvedAt deletedAt createdAt updatedAt")
  $memberUserUids: [String!]!
  $members: [StoryMember_Data!]!
    @allow(fields: "storyId userUid role createdAt")
  $preferences: [StoryPreference_Data!]!
    @allow(fields: "storyId contextEngine hardcoreFateMode fatePressure motionCoverActive assignedRevealBackdropPolicy updatedAt")
  $readerPreferenceUserUids: [String!]!
  $readerPreferences: [StoryReaderPreference_Data!]!
    @allow(fields: "storyId userUid fontSize fontFamily lineHeight paragraphSpacing lineHeightScale paragraphSpacingScale letterSpacing wordSpacing readingWidth textAlignment contextEngine themeOverride colorPaletteId highlightStyle updatedAt")
  $memoryStates: [StoryMemoryState_Data!]!
    @allow(fields: "storyId powerSystem currentPowerStage updatedAt")
  $memoryWarningIds: [UUID!]!
  $memoryWarnings: [StoryMemoryWarning_Data!]!
    @allow(fields: "id storyId warning resolvedAt createdAt")
  $ruleIds: [UUID!]!
  $rules: [StoryRule_Data!]!
    @allow(fields: "id storyId ruleKey ruleValue isPinned position updatedAt")
  $revealBackdropKeys: [String!]!
  $revealBackdrops: [StoryRevealBackdrop_Data!]!
    @allow(fields: "storyId entityStableKey backdropAssetId updatedAt")
  $arcIds: [UUID!]!
  $arcs: [StoryArc_Data!]!
    @allow(fields: "id storyId arcNumber title summary status episodicSummaries createdAt updatedAt")
  $chapterIds: [UUID!]!
  $chapters: [Chapter_Data!]!
    @allow(fields: "id storyId arcId legacyChapterId clientChapterId chapterNumber title premise status summary episodicSummary contentHash versionId syncRevision revision branchAnchor continuityWarnings continuitySoftNotes contractObjectiveFulfilled contractEvidence contractOpeningMatched embedding isSealed sealedAt hasContinuityFaults createdAt updatedAt")
  $codexEntityIds: [UUID!]!
  $codexEntities: [CodexEntity_Data!]!
    @allow(fields: "id storyId stableKey kind name role description status relationshipToMainCharacter relevanceState contextPriority authorContextNote firstAppearedChapter lastMajorInvolvementChapter currentRelevance toneMemory manifestationImportance isUserPinned pendingEvolution evolutionReady evolutionReason availableVisualUpdate lastImageChapter arcAccumulation sourceChapterNumber sourceBlockId provenanceCreatedBy provenanceConfidence lastMentionedChapter supersedesStableKey createdAt updatedAt")
  $codexAliases: [CodexAlias_Data!]!
    @allow(fields: "entityId alias normalizedAlias isCanonical")
  $codexAttributes: [CodexEntityAttribute_Data!]!
    @allow(fields: "entityId attributeKey stringValue numberValue booleanValue stringListValue jsonValue updatedAt")
  $codexRelationshipIds: [UUID!]!
  $codexRelationships: [CodexRelationship_Data!]!
    @allow(fields: "id storyId sourceEntityId targetEntityId sourceStableKey targetStableKey sourceName targetName relationshipKind affinity threat description status createdAt updatedAt")
  $plotThreadIds: [UUID!]!
  $plotThreads: [PlotThread_Data!]!
    @allow(fields: "id storyId description status originChapterNumber resolvedChapterNumber confidence isUserPinned stableKey sourceChapterNumber sourceBlockId provenanceCreatedBy provenanceConfidence lastMentionedChapter supersedesStableKey createdAt updatedAt")
  $codexThreadLinks: [CodexThreadLink_Data!]!
    @allow(fields: "entityId threadId createdAt")
  $abilityProgressionIds: [UUID!]!
  $abilityProgression: [AbilityProgressionEvent_Data!]!
    @allow(fields: "id abilityEntityId chapterNumber fromMastery toMastery note createdAt")
  $karmaNodeIds: [UUID!]!
  $karmaNodes: [KarmaNode_Data!]!
    @allow(fields: "id storyId sourceEntityId targetEntityId sourceStableKey targetStableKey sourceName targetName description severity nodeType status createdAt resolvedAt")
  $timelineEventIds: [UUID!]!
  $timelineEvents: [TimelineEvent_Data!]!
    @allow(fields: "id storyId chapterId chapterNumber title description eventType occurredAtLabel createdAt")
  $bookmarkIds: [UUID!]!
  $bookmarks: [Bookmark_Data!]!
    @allow(fields: "id userUid storyId chapterId paragraphIndex paragraphExcerpt note createdAt")
  $readingProgressUserUids: [String!]!
  $readingProgresses: [ReadingProgress_Data!]!
    @allow(fields: "userUid storyId chapterNumber anchorBlockId anchorText anchorOffset anchorParagraphIndex anchorContentSignature anchorIntraBlockRatio anchorSavedAt legacyScrollPosition anchor totalReadingTimeMs lastReadAt updatedAt")
  $arcReadingProgresses: [ArcReadingProgress_Data!]!
    @allow(fields: "userUid storyId arcNumber readingTimeMs updatedAt")
  $glossaryTermIds: [UUID!]!
  $glossaryTerms: [GlossaryTerm_Data!]!
    @allow(fields: "id storyId sourceText targetText targetLanguage note createdAt updatedAt")
  $generationJobIds: [UUID!]!
  $generationJobs: [GenerationJob_Data!]!
    @allow(fields: "id ownerUid storyId chapterId kind status provider model inputHash idempotencyKey attemptCount errorCode errorMessage startedAt completedAt createdAt updatedAt")
  $generationEventIds: [UUID!]!
  $generationEvents: [GenerationEvent_Data!]!
    @allow(fields: "id jobId eventType message progress createdAt")
  $generationBatchIds: [UUID!]!
  $generationBatches: [ChapterGenerationBatch_Data!]!
    @allow(fields: "id storyId clientBatchId status currentChapterNumber failedChapterNumber errorMessage createdAt completedAt updatedAt")
  $generationBatchItems: [ChapterGenerationBatchItem_Data!]!
    @allow(fields: "batchId chapterNumber status completedAt updatedAt")
) @retired(reason: "Admin-only bulk graph inputs are invoked with firebase-admin DataConnect")
  @auth(level: NO_ACCESS)
  @transaction {
  query @redact {
    existing: story(first: { where: { id: { eq: $storyId }, ownerUid: { eq: $ownerUid } } })
      @check(
        expr: "this == null"
        message: "Story bootstrap requires a new story"
      ) {
      status
      syncRevision
    }
    duplicate: persistenceReceipt(
      key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    ) @check(expr: "this == null", message: "Idempotency key already completed") {
      idempotencyKey
    }
  }

  storyVersionGuard: _executeReturningFirst(
    sql: """
      INSERT INTO persistence_aggregate_version (
        owner_uid, aggregate_kind, aggregate_id, sync_revision, revision, updated_at
      )
      SELECT $1, 'STORY', CAST($2 AS text), $4, $5, NOW()
      WHERE (
        EXISTS (
          SELECT 1 FROM story
          WHERE id = $2 AND owner_uid = $1 AND status <> 'DELETED'
            AND sync_revision IS NOT DISTINCT FROM $3
        )
        OR (
          $3 IS NULL
          AND NOT EXISTS (SELECT 1 FROM story WHERE id = $2)
        )
      )
      ON CONFLICT (owner_uid, aggregate_kind, aggregate_id) DO UPDATE SET
        sync_revision = EXCLUDED.sync_revision,
        revision = EXCLUDED.revision,
        updated_at = NOW()
      WHERE persistence_aggregate_version.sync_revision IS NOT DISTINCT FROM $3
      RETURNING aggregate_id
    """
    params: [$ownerUid, $storyId, $expectedSyncRevision, $newSyncRevision, $newRevision]
  ) @check(expr: "this != null", message: "Story compare-and-swap failed")

  story_upsert(data: $story)
  storyMember_upsertMany(data: $members)
  storyPreference_upsertMany(data: $preferences)
  storyReaderPreference_upsertMany(data: $readerPreferences)
  storyMemoryState_upsertMany(data: $memoryStates)
  storyMemoryWarning_upsertMany(data: $memoryWarnings)
  storyRule_upsertMany(data: $rules)
  storyRevealBackdrop_upsertMany(data: $revealBackdrops)
  storyArc_upsertMany(data: $arcs)
  chapter_upsertMany(data: $chapters)
  codexEntity_upsertMany(data: $codexEntities)
  codexAlias_upsertMany(data: $codexAliases)
  codexEntityAttribute_upsertMany(data: $codexAttributes)
  plotThread_upsertMany(data: $plotThreads)
  codexThreadLink_upsertMany(data: $codexThreadLinks)
  codexRelationship_upsertMany(data: $codexRelationships)
  abilityProgressionEvent_upsertMany(data: $abilityProgression)
  karmaNode_upsertMany(data: $karmaNodes)
  timelineEvent_upsertMany(data: $timelineEvents)
  bookmark_upsertMany(data: $bookmarks)
  readingProgress_upsertMany(data: $readingProgresses)
  arcReadingProgress_upsertMany(data: $arcReadingProgresses)
  glossaryTerm_upsertMany(data: $glossaryTerms)
  generationJob_upsertMany(data: $generationJobs)
  generationEvent_upsertMany(data: $generationEvents)
  chapterGenerationBatch_upsertMany(data: $generationBatches)
  chapterGenerationBatchItem_upsertMany(data: $generationBatchItems)
  persistenceReceipt_insert(
    data: {
      ownerUid: $ownerUid
      idempotencyKey: $idempotencyKey
      operation: "UPSERT_STORY_GRAPH"
      storyId: $storyId
      resultingSyncRevision: $newSyncRevision
      resultingRevision: $newRevision
      requestHash: $requestHash
    }
  )
  storyChange_insert(
    data: {
      ownerUid: $ownerUid
      storyId: $storyId
      changeKind: UPSERTED
      storyRevision: $newRevision
      syncRevision: $newSyncRevision
      idempotencyKey: $idempotencyKey
    }
  )
}

