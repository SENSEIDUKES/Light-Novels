      idempotencyKey: $idempotencyKey
      status: PENDING
      currentStage: TOMBSTONE
    }
  )
  storyDeletionStage_insertMany(
    data: [
      { jobId: $deletionJobId, stage: TOMBSTONE, status: SUCCEEDED }
      { jobId: $deletionJobId, stage: STRUCTURED_DATA, status: PENDING }
      { jobId: $deletionJobId, stage: MEDIA, status: PENDING }
      { jobId: $deletionJobId, stage: LOCAL_CACHE, status: PENDING }
      { jobId: $deletionJobId, stage: FINALIZE, status: PENDING }
    ]
  )
  persistenceReceipt_insert(
    data: {
      ownerUid: $ownerUid
      idempotencyKey: $idempotencyKey
      operation: "DELETE_STORY"
      storyId: $storyId
      resultingSyncRevision: $newSyncRevision
      resultingRevision: $newRevision
    }
  )
  storyChange_insert(
    data: {
      ownerUid: $ownerUid
      storyId: $storyId
      changeKind: DELETED
      storyRevision: $newRevision
      syncRevision: $newSyncRevision
      idempotencyKey: $idempotencyKey
    }
  )
}

mutation AdminClaimStoryDeletionJob(
  $jobId: UUID!
  $leaseOwner: String!
  $leaseExpiresAt: Timestamp!
  $stage: StoryDeletionStageKind!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    job: storyDeletionJob(first: { where: { id: { eq: $jobId }, currentStage: { eq: $stage } } })
      @check(expr: "this != null", message: "Deletion job stage changed") {
      id
    }
  }
  storyDeletionJob_update(
    first: {
      where: {
        _and: [
          { id: { eq: $jobId } }
          {
            _or: [
              { status: { in: [PENDING, FAILED] } }
              { status: { eq: RUNNING }, leaseExpiresAt: { lt_expr: "request.time" } }
            ]
          }
          {
            _or: [
              { leaseExpiresAt: { isNull: true } }
              { leaseExpiresAt: { lt_expr: "request.time" } }
            ]
          }
        ]
      }
    }
    data: {
      status: RUNNING
      leaseOwner: $leaseOwner
      leaseExpiresAt: $leaseExpiresAt
      attemptCount_update: { inc: 1 }
      updatedAt_expr: "request.time"
    }
  ) @check(expr: "this != null", message: "Deletion job is not claimable")
  storyDeletionStage_update(
    key: { jobId: $jobId, stage: $stage }
    data: {
      status: RUNNING
      attemptCount_update: { inc: 1 }
      startedAt_expr: "request.time"
      lastError: null
      updatedAt_expr: "request.time"
    }
  )
}

mutation AdminFailStoryDeletionJob(
  $jobId: UUID!
  $leaseOwner: String!
  $stage: StoryDeletionStageKind!
  $lastError: String!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    storyDeletionJob(
      first: {
        where: {
          id: { eq: $jobId }
          leaseOwner: { eq: $leaseOwner }
          currentStage: { eq: $stage }
          status: { eq: RUNNING }
        }
      }
    ) @check(expr: "this != null", message: "Deletion job lease not held") {
      id
    }
  }
  storyDeletionStage_update(
    key: { jobId: $jobId, stage: $stage }
    data: { status: FAILED, lastError: $lastError, updatedAt_expr: "request.time" }
  )
  storyDeletionJob_update(
    id: $jobId
    data: {
      status: FAILED
      leaseOwner: null
      leaseExpiresAt: null
      lastError: $lastError
      updatedAt_expr: "request.time"
    }
  )
}

mutation AdminAdvanceStoryDeletionJob(
  $jobId: UUID!
  $leaseOwner: String!
  $completedStage: StoryDeletionStageKind!
  $nextStage: StoryDeletionStageKind!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
