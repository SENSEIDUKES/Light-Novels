mutation AdminConsumeImageGenerationQuota(
  $ownerUid: String!
  $idempotencyKey: String!
  $now: Timestamp!
  $nextReset: Timestamp!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    profile: userProfile(key: { userUid: $ownerUid })
      @check(expr: "this != null", message: "User profile not found") {
      userUid
    }
    duplicate: imageQuotaConsumption(
      key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    ) @check(expr: "this == null", message: "Image quota request already completed") {
      idempotencyKey
    }
  }
  consumed: _execute(
    sql: """
      WITH charged AS (
        UPDATE user_profile
        SET image_generation_count = CASE
              WHEN image_quota_reset_at IS NULL OR image_quota_reset_at <= $2 THEN 1
              ELSE image_generation_count + 1
            END,
            image_quota_reset_at = CASE
              WHEN image_quota_reset_at IS NULL OR image_quota_reset_at <= $2 THEN $3
              ELSE image_quota_reset_at
            END,
            revision = revision + 1,
            updated_at = NOW()
        WHERE user_uid = $1
          AND (
            image_quota_reset_at IS NULL
            OR image_quota_reset_at <= $2
            OR subscription_tier <> 'MORTAL'
            OR image_generation_count < 4
          )
          AND NOT EXISTS (
            SELECT 1 FROM image_quota_consumption
            WHERE owner_uid = $1 AND idempotency_key = $4
          )
        RETURNING user_uid, image_generation_count, image_quota_reset_at
      )
      INSERT INTO image_quota_consumption (
        owner_uid, idempotency_key, image_generation_count, image_quota_reset_at, consumed_at
      )
      SELECT user_uid, $4, image_generation_count, image_quota_reset_at, NOW()
      FROM charged
    """
    params: [$ownerUid, $now, $nextReset, $idempotencyKey]
  ) @check(
    expr: "this == 1"
    message: "Mortal tier limits reached (4 manifestations max per day)"
  )
}

mutation AdminRecoverPendingUserPortraits(
  $ownerUid: String!
  $idempotencyKey: String!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    profile: userProfile(key: { userUid: $ownerUid })
      @check(expr: "this != null", message: "User profile not found") {
      userUid
    }
    duplicate: persistenceReceipt(
      key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    ) @check(expr: "this == null", message: "Idempotency key already completed") {
      idempotencyKey
    }
  }
  recovered: _execute(
    sql: """
      WITH candidate AS (
        SELECT slot.current_asset_id AS asset_id
        FROM media_slot AS slot
        JOIN media_asset AS asset
          ON asset.id = slot.current_asset_id
         AND asset.owner_uid = slot.owner_uid
         AND asset.status = 'READY'
         AND asset.asset_type = 'IMAGE'
        JOIN user_profile AS profile
          ON profile.user_uid = slot.owner_uid
        WHERE slot.owner_uid = $1
          AND slot.target_kind = 'PORTRAIT'
          AND slot.target_key = $1
          AND slot.purpose = 'CELESTIAL_PORTRAIT'
          AND (
            profile.active_portrait_asset_id IS DISTINCT FROM slot.current_asset_id
            OR NOT EXISTS (
              SELECT 1 FROM user_portrait
              WHERE asset_id = slot.current_asset_id
                AND user_uid = $1
                AND active = TRUE
            )
          )
        ORDER BY slot.updated_at DESC
        LIMIT 1
      ), recovered_portrait AS (
        INSERT INTO user_portrait (
          asset_id, user_uid, used_reference_image, active, created_at, updated_at
        )
        SELECT asset_id, $1, FALSE, TRUE, NOW(), NOW()
        FROM candidate
        ON CONFLICT (asset_id) DO UPDATE SET
          user_uid = EXCLUDED.user_uid,
          active = TRUE,
          updated_at = NOW()
        RETURNING asset_id, user_uid
      ), deactivated AS (
        UPDATE user_portrait AS portrait
        SET active = FALSE, updated_at = NOW()
        FROM recovered_portrait
        WHERE portrait.user_uid = $1
          AND portrait.asset_id <> recovered_portrait.asset_id
          AND portrait.active = TRUE
        RETURNING portrait.asset_id
      ), updated_profile AS (
        UPDATE user_profile AS profile
        SET active_portrait_asset_id = recovered_portrait.asset_id,
            sync_revision = $2,
            revision = profile.revision + 1,
            updated_at = NOW()
        FROM recovered_portrait
        WHERE profile.user_uid = $1
        RETURNING profile.user_uid, profile.sync_revision, profile.revision
      )
      INSERT INTO persistence_aggregate_version (
        owner_uid, aggregate_kind, aggregate_id, sync_revision, revision, updated_at
      )
      SELECT user_uid, 'USER_PROFILE', user_uid, sync_revision, revision, NOW()
      FROM updated_profile
      ON CONFLICT (owner_uid, aggregate_kind, aggregate_id) DO UPDATE SET
        sync_revision = EXCLUDED.sync_revision,
        revision = EXCLUDED.revision,
        updated_at = NOW()
    """
    params: [$ownerUid, $idempotencyKey]
  )
  persistenceReceipt_insert(
    data: {
      ownerUid: $ownerUid
      idempotencyKey: $idempotencyKey
      operation: "RECOVER_PENDING_USER_PORTRAITS"
      resultingSyncRevision: $idempotencyKey
    }
  )
}

mutation AdminUpdateAccountAccess(
  $actorUid: String!
  $ownerUid: String!
  $role: AccountRole!
  $subscriptionTier: SubscriptionTier!
  $idempotencyKey: String!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    actor: userAccount(key: { uid: $actorUid })
      @check(
        expr: "this != null && (this.role == 'ADMIN' || this.role == 'OWNER')"
        message: "Administrator access required"
      ) {
      role
    }
    target: userAccount(key: { uid: $ownerUid })
      @check(expr: "this != null", message: "Target account not found") {
      uid
    }
    targetProfile: userProfile(key: { userUid: $ownerUid })
      @check(expr: "this != null", message: "Target profile not found") {
      userUid
    }
    duplicate: persistenceReceipt(
      key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    ) @check(expr: "this == null", message: "Idempotency key already completed") {
      idempotencyKey
    }
  }
  userAccount_update(
    key: { uid: $ownerUid }
    data: { role: $role, updatedAt_expr: "request.time" }
  )
  userProfile_update(
    key: { userUid: $ownerUid }
    data: {
      subscriptionTier: $subscriptionTier
      revision_update: { inc: 1 }
      updatedAt_expr: "request.time"
    }
  )
  persistenceReceipt_insert(
    data: {
      ownerUid: $ownerUid
      idempotencyKey: $idempotencyKey
      operation: "UPDATE_ACCOUNT_ACCESS"
    }
  )
}

mutation AdminDeleteStoryAsAdmin(
  $actorUid: String!
  $ownerUid: String!
  $storyId: UUID!
  $expectedSyncRevision: String
  $newSyncRevision: String!
  $newRevision: Int64!
  $idempotencyKey: String!
  $deletionJobId: UUID!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    actor: userAccount(key: { uid: $actorUid })
      @check(
        expr: "this != null && (this.role == 'ADMIN' || this.role == 'OWNER')"
        message: "Administrator access required"
      ) {
      role
    }
    existing: story(first: { where: { id: { eq: $storyId }, ownerUid: { eq: $ownerUid } } })
      @check(
        expr: "this != null && this.status != 'DELETED' && this.syncRevision == vars.expectedSyncRevision"
        message: "Story is deleted or the expected revision is stale"
      ) {
      status
      syncRevision
    }
    duplicate: persistenceReceipt(
      key: { ownerUid: $ownerUid, idempotencyKey: $idempotencyKey }
    ) @check(expr: "this == null", message: "Idempotency key already completed") {
      idempotencyKey
    }
  }
  storyVersionGuard: _executeReturningFirst(
    sql: """
      INSERT INTO persistence_aggregate_version (
        owner_uid, aggregate_kind, aggregate_id, sync_revision, revision, updated_at
      )
      SELECT $1, 'STORY', CAST($2 AS text), $4, $5, NOW()
      WHERE EXISTS (
        SELECT 1 FROM story
        WHERE id = $2 AND owner_uid = $1 AND status <> 'DELETED'
          AND sync_revision IS NOT DISTINCT FROM $3
      )
      ON CONFLICT (owner_uid, aggregate_kind, aggregate_id) DO UPDATE SET
        sync_revision = EXCLUDED.sync_revision,
        revision = EXCLUDED.revision,
        updated_at = NOW()
      WHERE persistence_aggregate_version.sync_revision IS NOT DISTINCT FROM $3
      RETURNING aggregate_id
    """
    params: [$ownerUid, $storyId, $expectedSyncRevision, $newSyncRevision, $newRevision]
  ) @check(expr: "this != null", message: "Story compare-and-swap failed")
  story_update(
    first: {
      where: {
        id: { eq: $storyId }
        ownerUid: { eq: $ownerUid }
        status: { ne: DELETED }
        syncRevision: { eq: $expectedSyncRevision }
      }
    }
    data: {
      status: DELETED
      syncRevision: $newSyncRevision
      revision: $newRevision
      deletedAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  ) @check(expr: "this != null", message: "Story revision changed")
  storyDeletionJob_insert(
    data: {
      id: $deletionJobId
      ownerUid: $ownerUid
      storyId: $storyId
      idempotencyKey: $idempotencyKey
      status: PENDING
      currentStage: TOMBSTONE
    }
  )
  storyDeletionStage_insertMany(
    data: [
      { jobId: $deletionJobId, stage: TOMBSTONE, status: SUCCEEDED }
      { jobId: $deletionJobId, stage: STRUCTURED_DATA, status: PENDING }
      { jobId: $deletionJobId, stage: MEDIA, status: PENDING }
      { jobId: $deletionJobId, stage: LOCAL_CACHE, status: PENDING }
      { jobId: $deletionJobId, stage: FINALIZE, status: PENDING }
    ]
  )
  persistenceReceipt_insert(
    data: {
      ownerUid: $ownerUid
      idempotencyKey: $idempotencyKey
      operation: "ADMIN_DELETE_STORY"
      storyId: $storyId
      resultingSyncRevision: $newSyncRevision
      resultingRevision: $newRevision
    }
  )
  storyChange_insert(
    data: {
      ownerUid: $ownerUid
      storyId: $storyId
      changeKind: DELETED
      storyRevision: $newRevision
      syncRevision: $newSyncRevision
      idempotencyKey: $idempotencyKey
    }
  )
}
