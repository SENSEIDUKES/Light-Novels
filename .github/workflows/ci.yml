name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Compile Data Connect foundation
      run: npm run dataconnect:compile

    - name: Verify generated Data Connect SDKs are current
      shell: bash
      run: |
        if [[ -n "$(git status --porcelain --untracked-files=all -- src/generated/dataconnect src/generated/dataconnect-admin)" ]]; then
          git status --short --untracked-files=all -- src/generated/dataconnect src/generated/dataconnect-admin
          git diff -- src/generated/dataconnect src/generated/dataconnect-admin
          exit 1
        fi

    - name: Test Auth and Data Connect foundation
      run: npm run test:foundation:e2e

    - name: Run linter
      run: npm run lint

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Build project
      run: npm run build
